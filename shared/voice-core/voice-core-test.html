<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Voice Core — Mock Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    button { margin: 0.25rem; padding: 0.5rem 1rem; }
    #log { background: #f4f4f5; padding: 1rem; min-height: 200px; white-space: pre-wrap; font-size: 14px; }
    .ok { color: #047857; }
    .err { color: #b91c1c; }
  </style>
</head>
<body>
  <h1>Voice Core</h1>
  <p>Mock + Live boundary (Phase 5-B WebSocket transport opt-in) + STT/TTS/Fallback — no external API by default.</p>
  <div>
    <button type="button" id="btn-start">Start session</button>
    <button type="button" id="btn-text">Send text</button>
    <button type="button" id="btn-audio">Send audio</button>
    <button type="button" id="btn-stop">Stop session</button>
    <button type="button" id="btn-auto">Run auto test</button>
    <button type="button" id="btn-gemini-auto">Run Gemini auto test</button>
    <button type="button" id="btn-stt-mock">STT Mock</button>
    <button type="button" id="btn-tts-mock">TTS Mock</button>
    <button type="button" id="btn-fallback-mock">Fallback Mock</button>
    <button type="button" id="btn-policy-mock">Policy Mock</button>
  </div>
  <pre id="log"></pre>

  <script src="voice-core-events.js"></script>
  <script src="voice-adapter-interface.js"></script>
  <script src="voice-mock-adapter.js"></script>
  <script src="voice-realtime-options.js"></script>
  <script src="voice-realtime-connect-policy.js"></script>
  <script src="voice-realtime-config.js"></script>
  <script src="voice-realtime-event-mapper.js"></script>
  <script src="voice-openai-realtime-wire-client.js"></script>
  <script src="transports/voice-openai-realtime-websocket-transport.js"></script>
  <script src="adapters/voice-openai-realtime-adapter.js"></script>
  <script src="voice-gemini-live-options.js"></script>
  <script src="voice-gemini-live-event-mapper.js"></script>
  <script src="adapters/voice-gemini-live-adapter.js"></script>
  <script src="stt/voice-stt-adapter-interface.js"></script>
  <script src="stt/voice-stt-mock-adapter.js"></script>
  <script src="tts/voice-tts-adapter-interface.js"></script>
  <script src="tts/voice-tts-mock-adapter.js"></script>
  <script src="voice-fallback-router.js"></script>
  <script src="voice-provider-router.js"></script>
  <script src="voice-session.js"></script>
  <script src="voice-core.js"></script>
  <script>
    (function () {
      const logEl = document.getElementById("log");
      let session = null;
      const lines = [];

      function log(msg, cls) {
        lines.push(msg);
        logEl.textContent = lines.join("\n");
        if (cls) logEl.className = cls;
      }

      function bindSession(s) {
        s.receiveEvent((ev) => log(JSON.stringify(ev)));
      }

      document.getElementById("btn-start").onclick = () => {
        session = window.TasuVoiceCore.startSession({ surface: "voice_core_test", provider: "mock" });
        bindSession(session);
        log("started: " + session.id);
      };

      document.getElementById("btn-text").onclick = () => {
        if (!session) return log("no session", "err");
        session.sendText("hello voice core");
      };

      document.getElementById("btn-audio").onclick = () => {
        if (!session) return log("no session", "err");
        session.sendAudio(new Uint8Array([1, 2, 3, 4]));
      };

      document.getElementById("btn-stop").onclick = () => {
        if (!session) return log("no session", "err");
        session.stopSession();
        log("stopped", "ok");
      };

      document.getElementById("btn-auto").onclick = async () => {
        const events = [];
        const s = window.TasuVoiceCore.createSession({ surface: "auto", provider: "mock" });
        s.receiveEvent((ev) => events.push(ev.type));
        s.startSession({ provider: "mock", kind: "mock" });
        s.sendText("phase1");
        s.sendAudio(new Uint8Array([0]));
        s.stopSession();
        const need = ["session_started", "text_delta", "audio_delta_mock", "session_stopped"];
        const ok = need.every((t) => events.includes(t));
        log(ok ? "AUTO PASS: " + events.join(", ") : "AUTO FAIL: " + events.join(", "), ok ? "ok" : "err");
      };

      document.getElementById("btn-gemini-auto").onclick = () => {
        const events = [];
        const s = window.TasuVoiceCore.createSession({ surface: "gemini-auto", provider: "gemini_live", kind: "live" });
        s.receiveEvent((ev) => events.push(ev.type));
        s.startSession({ provider: "gemini_live", kind: "live", mockCompatible: true });
        s.sendText("phase3");
        s.sendAudio(new Uint8Array([2, 4, 6]));
        s.stopSession();
        const need = ["session_started", "text_delta", "audio_delta_mock", "session_stopped"];
        const ok = need.every((t) => events.includes(t));
        log(ok ? "GEMINI AUTO PASS: " + events.join(", ") : "GEMINI AUTO FAIL: " + events.join(", "), ok ? "ok" : "err");
      };

      document.getElementById("btn-stt-mock").onclick = () => {
        const stt = window.TasuVoiceCore.createSTTAdapter({ provider: "mock" });
        const result = stt.recognize(new Uint8Array([1, 2, 3]), { language: "ja-JP" });
        const types = result.events.map((e) => e.type);
        const ok = types.includes("stt_final_mock") && result.text.includes("mock transcript");
        log(ok ? "STT MOCK PASS: " + result.text : "STT MOCK FAIL", ok ? "ok" : "err");
      };

      document.getElementById("btn-tts-mock").onclick = () => {
        const tts = window.TasuVoiceCore.createTTSAdapter({ provider: "mock" });
        const result = tts.synthesize("phase4 tts test", { language: "ja-JP" });
        const types = result.events.map((e) => e.type);
        const ok = types.includes("tts_audio_chunk_mock") && result.audio?.bytes?.length > 0;
        log(ok ? "TTS MOCK PASS: bytes=" + result.audio.bytes.length : "TTS MOCK FAIL", ok ? "ok" : "err");
      };

      document.getElementById("btn-fallback-mock").onclick = () => {
        const router = window.TasuVoiceCore.createFallbackRouter();
        const primary = router.getPrimary();
        const next = router.routeOnFailure("openai_realtime");
        const walk = router.simulateFallbackWalk("openai_realtime");
        const ok =
          primary?.provider === "openai_realtime" &&
          next.nextProvider === "gemini_live" &&
          walk.steps.length >= 2;
        log(ok ? "FALLBACK MOCK PASS: " + JSON.stringify({ primary, next: next.nextProvider }) : "FALLBACK MOCK FAIL", ok ? "ok" : "err");
      };

      document.getElementById("btn-policy-mock").onclick = () => {
        const policy = window.TasuVoiceCore.resolveConnectPolicy({ mockCompatible: true });
        const disabled = window.TasuVoiceCore.resolveConnectPolicy({ mockCompatible: false });
        const ok = policy.mode === "mock" && disabled.reason === "live_disabled";
        log(ok ? "POLICY MOCK PASS: default mock, live disabled without flag" : "POLICY MOCK FAIL", ok ? "ok" : "err");
      };
    })();
  </script>
</body>
</html>
