# Supabase CLI 用（Edge Functions デプロイ）
# https://supabase.com/docs/guides/functions

# Staging PostgREST — expose tlv schema for Edge Functions (service_role + RPC)
# Push: npx supabase config push --project-ref ddojquacsyqesrjhcvmn --yes
[api]
schemas = ["public", "graphql_public", "tlv"]
extra_search_path = ["public", "extensions", "tlv"]

[functions.stripe-create-checkout]
verify_jwt = false

[functions.stripe-confirm-checkout]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# ブラウザ（localhost:8765 等）からの fetch — OPTIONS / CORS を通す
[functions.serper-search]
verify_jwt = false

[functions.gemini-chat]
verify_jwt = false

[functions.openai-chat]
verify_jwt = false

[functions.openai-realtime-session]
verify_jwt = false

[functions.claude-chat]
verify_jwt = false

[functions.gemini-chat-diagnose]
verify_jwt = false

# L6: Custom Access Token Hook (linked ref ddojquacsyqesrjhcvmn)
# Enable via: npx supabase config push --project-ref ddojquacsyqesrjhcvmn --yes
# Rollback: set enabled = false and push again
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[functions.partner-create]
verify_jwt = false

[functions.partner-list]
verify_jwt = false

[functions.partner-get]
verify_jwt = false

[functions.partner-review]
verify_jwt = false

[functions.partner-document-verify]
verify_jwt = false

[functions.business-directory]
verify_jwt = false

[functions.tlv-create-coin-purchase]
verify_jwt = false

[functions.tlv-payment-webhook]
verify_jwt = false

[functions.tlv-create-tip]
verify_jwt = false

[functions.tlv-e2e-simulate-payment]
verify_jwt = false
