<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c0f1d" />
  <title>お気に入りパートナー | Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-favorites">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="./index.html" aria-label="Builderダッシュボードへ">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" />
                <path d="m12 19-7-7 7-7" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder</span>
              <span class="builder-brand__sub">お気に入り</span>
            </span>
          </a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">お気に入りパートナー</h1>
          <p class="builder-header__sub">よく依頼する協力会社をすぐ呼び出し</p>
        </div>

        <a class="builder-account" href="partners.html" aria-label="検索へ">
          <img class="builder-account__avatar" data-dash-avatar src="https://placehold.co/64x64/fff7ed/c2410c?text=BU" width="40" height="40" alt="" />
          <span class="builder-account__text">
            <span class="builder-account__name" data-dash-user-name>会員</span>
            <span class="builder-account__sub" data-builder-member-type>建設パートナー</span>
          </span>
          <svg class="builder-account__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </a>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main">
      <section class="builder-panel" aria-label="お気に入り一覧">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">一覧</h2>
          <a class="builder-section-link" href="partners.html">協力会社検索へ ›</a>
        </div>
        <ul class="builder-list" data-builder-favorite-list></ul>
      </section>

      <footer class="builder-footer" aria-label="フッター">
        <p>© 2024 TASFUL. All rights reserved.</p>
      </footer>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" }).catch(function () {});
      });
    }
  </script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
</body>
</html>
