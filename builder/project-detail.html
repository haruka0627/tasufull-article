<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>案件詳細 | TASFUL Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="builder-project-hub.css" />
  <link rel="stylesheet" href="builder-project-calendar.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-project-detail">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="案件詳細">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="./index.html" aria-label="Builder ダッシュボード">
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder</span>
              <span class="builder-brand__sub">案件詳細</span>
            </span>
          </a>
          <a class="builder-page-back" href="project-hub.html" data-builder-ph-back>‹ 案件ハブ</a>
        </div>
        <div class="builder-header__center">
          <h1 class="builder-header__title" data-builder-pd-title>案件詳細</h1>
          <p class="builder-header__sub" data-builder-pd-sub>—</p>
        </div>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main" data-builder-pd-root hidden>
      <div class="builder-ph-detail-grid">
        <div>
          <section class="builder-panel" aria-label="見積">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">見積</h2>
            </div>
            <div class="builder-ph-doc-summary" data-builder-pd-estimate-totals></div>
            <form class="builder-ph-doc-form" data-builder-pd-estimate-form>
              <label>
                見積番号
                <input class="builder-input" type="text" data-builder-pd-estimate-number />
              </label>
              <label>
                見積状態
                <select class="builder-select" data-builder-pd-estimate-status></select>
              </label>
              <label>
                顧客名
                <input class="builder-input" type="text" data-builder-pd-estimate-customer />
              </label>
              <label>
                有効期限
                <input class="builder-input" type="date" data-builder-pd-estimate-valid-until />
              </label>
              <label class="builder-ph-doc-form__wide">
                顧客住所
                <input class="builder-input" type="text" data-builder-pd-estimate-address />
              </label>
              <div class="builder-ph-doc-form__wide">
                <span class="builder-kpi">項目一覧</span>
                <table class="builder-ph-items-table" data-builder-pd-estimate-items-table>
                  <thead>
                    <tr><th>内容</th><th>数量</th><th>単価</th></tr>
                  </thead>
                  <tbody data-builder-pd-estimate-items></tbody>
                </table>
              </div>
              <label class="builder-ph-doc-form__wide">
                メモ
                <textarea class="builder-ph-memo" data-builder-pd-estimate-memo rows="2"></textarea>
              </label>
              <button type="submit" class="builder-btn builder-btn--secondary builder-btn--sm">見積を保存</button>
              <p class="builder-kpi" data-builder-pd-estimate-status-msg aria-live="polite"></p>
            </form>
          </section>

          <section class="builder-panel" aria-label="請求">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">請求</h2>
            </div>
            <div class="builder-ph-doc-summary" data-builder-pd-invoice-totals></div>
            <form class="builder-ph-doc-form" data-builder-pd-invoice-form>
              <label>
                請求番号
                <input class="builder-input" type="text" data-builder-pd-invoice-number />
              </label>
              <label>
                状態
                <select class="builder-select" data-builder-pd-invoice-status></select>
              </label>
              <label>
                請求日
                <input class="builder-input" type="date" data-builder-pd-invoice-issued />
              </label>
              <label>
                支払期限
                <input class="builder-input" type="date" data-builder-pd-invoice-due />
              </label>
              <label>
                入金日
                <input class="builder-input" type="date" data-builder-pd-invoice-paid />
              </label>
              <label>
                小計（円）
                <input class="builder-input" type="number" min="0" step="1000" data-builder-pd-invoice-subtotal />
              </label>
              <label class="builder-ph-doc-form__wide">
                メモ
                <textarea class="builder-ph-memo" data-builder-pd-invoice-memo rows="2"></textarea>
              </label>
              <button type="submit" class="builder-btn builder-btn--secondary builder-btn--sm">請求を保存</button>
              <p class="builder-kpi" data-builder-pd-invoice-status-msg aria-live="polite"></p>
            </form>
          </section>

          <section class="builder-panel" aria-label="収支">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">収支</h2>
            </div>
            <dl class="builder-ph-finance-readonly" data-builder-pd-finance-readonly></dl>
            <form class="builder-ph-finance-form" data-builder-pd-finance-form>
              <label>
                見積額（円）
                <input class="builder-input" type="number" min="0" step="1000" name="estimateAmount" data-builder-pd-finance-estimate />
              </label>
              <label>
                原価（円）
                <input class="builder-input" type="number" min="0" step="1000" name="costAmount" data-builder-pd-finance-cost />
              </label>
              <label>
                支払い状況
                <select class="builder-select" name="paymentStatus" data-builder-pd-finance-payment-status></select>
              </label>
              <label>
                支払予定日
                <input class="builder-input" type="date" name="paymentDueDate" data-builder-pd-finance-due />
              </label>
              <label>
                入金日
                <input class="builder-input" type="date" name="paidAt" data-builder-pd-finance-paid />
              </label>
              <label class="builder-ph-finance-form__wide">
                収支メモ
                <textarea class="builder-ph-memo" name="financeMemo" data-builder-pd-finance-memo rows="2" placeholder="入金条件・備考…"></textarea>
              </label>
              <button type="submit" class="builder-btn builder-btn--secondary builder-btn--sm">収支を保存</button>
              <p class="builder-kpi" data-builder-pd-finance-status aria-live="polite"></p>
            </form>
          </section>

          <section class="builder-panel" aria-label="工程・日程">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">工程・日程</h2>
              <a class="builder-btn builder-btn--ghost builder-btn--sm" href="project-calendar.html">カレンダー</a>
            </div>
            <form class="builder-pc-schedule-form" data-builder-pd-schedule-form>
              <label>
                開始日
                <input class="builder-input" type="date" name="scheduleStartDate" data-builder-pd-schedule-start />
              </label>
              <label>
                終了日
                <input class="builder-input" type="date" name="scheduleEndDate" data-builder-pd-schedule-end />
              </label>
              <label>
                工程
                <select class="builder-select" name="schedulePhase" data-builder-pd-schedule-phase></select>
              </label>
              <button type="submit" class="builder-btn builder-btn--secondary builder-btn--sm">日程を保存</button>
              <p class="builder-kpi" data-builder-pd-schedule-status aria-live="polite"></p>
            </form>
          </section>

          <section class="builder-panel" aria-label="案件情報">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">案件情報</h2>
              <span class="builder-ph-status" data-builder-pd-status-badge>—</span>
            </div>
            <dl class="builder-ph-dl" data-builder-pd-info></dl>
            <div class="builder-ph-actions">
              <a class="builder-btn builder-btn--primary" href="#" data-builder-pd-ai-link>Builder AI で診断</a>
              <a class="builder-btn builder-btn--ghost" href="project-hub.html">一覧へ戻る</a>
            </div>
          </section>

          <section class="builder-panel" aria-label="メモ">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">メモ</h2>
            </div>
            <textarea class="builder-ph-memo" data-builder-pd-memo rows="4" placeholder="現場メモ…"></textarea>
            <div class="builder-ph-actions">
              <button type="button" class="builder-btn builder-btn--secondary builder-btn--sm" data-builder-pd-memo-save>
                メモを保存
              </button>
              <p class="builder-kpi" data-builder-pd-memo-status aria-live="polite"></p>
            </div>
          </section>

          <section class="builder-panel" aria-label="Vision診断履歴">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">Builder AI 診断履歴</h2>
            </div>
            <div data-builder-pd-vision-list></div>
            <p class="builder-ph-empty" data-builder-pd-vision-empty>診断履歴はまだありません。Builder AI から現場写真を診断してください。</p>
          </section>
        </div>

        <aside>
          <section class="builder-panel" aria-label="タイムライン">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">タイムライン</h2>
            </div>
            <ol class="builder-ph-timeline" data-builder-pd-timeline></ol>
          </section>
        </aside>
      </div>

      <footer class="builder-footer"><p>© 2026 TASFUL inc. Builder Project Hub MVP</p></footer>
    </main>

    <main class="builder-shell builder-main" data-builder-pd-not-found hidden>
      <section class="builder-panel">
        <p class="builder-ph-empty">案件が見つかりません。</p>
        <a class="builder-btn builder-btn--ghost" href="project-hub.html">案件ハブへ</a>
      </section>
    </main>
  </div>

  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder-project-store.js"></script>
  <script src="builder-project-detail.js"></script>
</body>
</html>
