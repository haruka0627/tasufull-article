<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>パートナー詳細 | Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-partner-detail">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="partners.html" aria-label="協力会社検索へ">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" />
                <path d="m12 19-7-7 7-7" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder</span>
              <span class="builder-brand__sub">パートナー詳細</span>
            </span>
          </a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">パートナー詳細</h1>
          <p class="builder-header__sub">稼働・工種・依頼方法</p>
        </div>

        <a class="builder-account" href="favorites.html" aria-label="お気に入りへ">
          <img class="builder-account__avatar" data-dash-avatar src="https://placehold.co/64x64/fff7ed/c2410c?text=BU" width="40" height="40" alt="" />
          <span class="builder-account__text">
            <span class="builder-account__name" data-dash-user-name>会員</span>
            <span class="builder-account__sub" data-builder-member-type>建設パートナー</span>
          </span>
          <svg class="builder-account__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </a>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main">
      <section class="builder-panel" aria-label="パートナー概要">
        <div class="builder-panel__head">
          <h2 class="builder-section-title" data-builder-partner-name>—</h2>
          <span class="builder-kpi" data-builder-partner-meta>—</span>
        </div>

        <div class="builder-detail">
          <div class="builder-detail__card">
            <h3 class="builder-detail__title">対応</h3>
            <ul class="builder-tags" data-builder-partner-tags></ul>
          </div>
          <div class="builder-detail__card">
            <h3 class="builder-detail__title">一言</h3>
            <p class="builder-detail__text" data-builder-partner-headline>—</p>
          </div>
          <div class="builder-detail__card">
            <h3 class="builder-detail__title">連絡ポリシー（予定）</h3>
            <p class="builder-detail__text" data-builder-partner-contact>—</p>
            <p class="builder-detail__hint">Builderでは原則TASFUL Talkでやり取りする前提</p>
          </div>
        </div>

        <div class="builder-actions" data-builder-partner-actions>
          <button type="button" class="builder-btn builder-btn--primary" data-builder-fav-toggle>お気に入りに追加</button>
          <a class="builder-btn builder-btn--secondary" href="re-request.html?partner_id=" data-builder-re-request-link>再依頼</a>
          <a class="builder-btn builder-btn--ghost" href="mvp-project-detail.html?id=demo-project-001" data-builder-invite-link>案件に招待（demo）</a>
        </div>
      </section>

      <footer class="builder-footer" aria-label="フッター">
        <p>© 2024 TASFUL. All rights reserved.</p>
      </footer>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" }).catch(function () {});
      });
    }
  </script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
</body>
</html>
