<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="theme-color" content="#0b0814" />
  <title>長尺動画投稿 | TASFUL LIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
  <link rel="stylesheet" href="live.css" />
</head>
<body class="live-body tlv-page" data-page="live-video-upload" data-tlv-page="upload">
  <div class="tlv-desktop-shell" data-tlv-desktop-shell>
    <div data-tlv-desktop-sidebar-mount></div>
    <div class="tlv-desktop-main">
      <div data-tlv-desktop-topbar-mount></div>
      <main class="tlv-desktop-content tlv-desktop-content--upload">
        <div data-live-video-upload-root data-live-video-upload-root-desktop>
          <p class="live-loading">フォームを準備中…</p>
        </div>
      </main>
    </div>
  </div>

  <div class="tlv-mobile-shell" data-tlv-mobile-shell>
    <div data-tlv-mobile-header-mount></div>
    <main class="tlv-mobile-content tlv-mobile-content--upload">
      <div data-live-video-upload-root-mobile>
        <p class="live-loading">フォームを準備中…</p>
      </div>
    </main>
    <div data-tlv-mobile-tabbar-mount></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../chat-supabase-config.js"></script>
  <script src="tlv-feature-flags.js"></script>
  <script src="tlv-private-test-gate.js" defer></script>
  <script src="../talk-runtime.js" defer></script>
  <script src="../auth-current-user.js" defer></script>
  <script src="../tasu-supabase-client.js" defer></script>
  <script src="../chat-user-identity.js" defer></script>
  <script src="live-config.js" defer></script>
  <script src="tlv-nav.js" defer></script>
  <script src="tlv-dev-auth.js" defer></script>
  <script src="tlv-notification-types.js" defer></script>
  <script src="tlv-notification-service.js" defer></script>
  <script src="live-notify.js" defer></script>
  <script src="tlv-account-context.js" defer></script>
  <script src="tlv-view-account-menu.js" defer></script>
  <script src="tlv-videos-sidebar.js" defer></script>
  <script src="tlv-tasful-ai-entry.js" defer></script>
  <script src="live-video-upload.js" defer></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      const nav = window.TasuTlvNav;
      const sidebarApi = window.TasuTlvVideosSidebar;
      const tabbarMount = document.querySelector("[data-tlv-mobile-tabbar-mount]");

      if (sidebarApi?.mountVideosPageChrome) {
        sidebarApi.mountVideosPageChrome({
          activeId: "upload",
          headerLayout: "youtube",
          mobileHeaderOptions: {
            backHref: "my-videos.html",
            backLabel: "\u2190 \u30de\u30a4\u30da\u30fc\u30b8",
          },
        });
      } else {
        nav?.initPageShell?.({
          desktopNavId: "upload",
          mobileTabId: "my",
          topbarTitle: "\u9577\u5c3a\u52d5\u753b\u6295\u7a3f",
          mobileHeaderTitle: "\u6295\u7a3f",
          mobileHeaderOptions: {
            backHref: "my-videos.html",
            backLabel: "\u2190 \u623b\u308b",
          },
        });
      }
      if (nav && tabbarMount) {
        tabbarMount.innerHTML = nav.renderMobileTabbar("my");
      }

      const root = nav?.pickContentRoot?.(
        "[data-live-video-upload-root-desktop]",
        "[data-live-video-upload-root-mobile]",
      );
      if (root && window.TasuLiveVideoUpload?.mountUploadPage) {
        window.TasuLiveVideoUpload.mountUploadPage(root);
      }
    });
  </script>
</body>
</html>
