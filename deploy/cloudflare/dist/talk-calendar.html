<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>カレンダー | TASFUL TALK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="chat.css">
  <link rel="stylesheet" href="talk-home.css">
  <link rel="stylesheet" href="talk-sub-page.css">
</head>
<body class="talk-sub-page" data-page="talk-calendar">
  <header class="talk-sub-page__header">
    <a class="talk-sub-page__back" href="talk-home.html?tab=chat" data-talk-sub-back>← チャットに戻る</a>
    <h1 class="talk-sub-page__title">トークカレンダー</h1>
    <p class="talk-sub-page__sub" data-talk-calendar-subtitle></p>
  </header>
  <main class="talk-sub-page__main">
    <nav class="talk-sub-page__tabs" aria-label="カレンダー表示">
      <a class="talk-sub-page__tab" data-talk-calendar-tab="list" href="#">予定一覧</a>
      <a class="talk-sub-page__tab" data-talk-calendar-tab="add" href="#">予定を追加</a>
    </nav>
    <div class="talk-sub-page__panel" data-talk-calendar-view="list">
      <div class="talk-calendar-list" data-talk-calendar-list></div>
    </div>
    <div class="talk-sub-page__panel" data-talk-calendar-view="form" hidden>
      <div class="talk-calendar-form">
        <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">タイトル</span><input class="talk-friend-panel__input" type="text" data-talk-calendar-field="title"></label>
        <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">日時</span><input class="talk-friend-panel__input" type="datetime-local" data-talk-calendar-field="startsAt"></label>
        <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">場所</span><input class="talk-friend-panel__input" type="text" data-talk-calendar-field="location"></label>
        <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">メモ</span><textarea class="talk-friend-panel__input talk-friend-panel__textarea" data-talk-calendar-field="memo" rows="2"></textarea></label>
        <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">GoogleマップURL</span><input class="talk-friend-panel__input" type="url" data-talk-calendar-field="mapUrl" placeholder="https://maps.google.com/..."></label>
        <label class="talk-friend-panel__check"><input type="checkbox" data-talk-calendar-field="notifyEnabled" checked> 通知ON</label>
        <details class="talk-calendar-form__work">
          <summary>仕事・取引用項目</summary>
          <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">集合時間</span><input class="talk-friend-panel__input" type="text" data-talk-calendar-field="meetingTime"></label>
          <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">現場住所</span><input class="talk-friend-panel__input" type="text" data-talk-calendar-field="siteAddress"></label>
          <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">駐車場</span><input class="talk-friend-panel__input" type="text" data-talk-calendar-field="parking"></label>
          <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">持ち物</span><input class="talk-friend-panel__input" type="text" data-talk-calendar-field="belongings"></label>
          <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">担当者</span><input class="talk-friend-panel__input" type="text" data-talk-calendar-field="assignee"></label>
          <label class="talk-friend-panel__field"><span class="talk-friend-panel__label">ナビURL</span><input class="talk-friend-panel__input" type="url" data-talk-calendar-field="navUrl"></label>
        </details>
      </div>
      <div class="talk-sub-page__actions">
        <button type="button" class="talk-ai-action talk-ai-action--primary" data-talk-calendar-submit>予定を保存</button>
      </div>
    </div>
  </main>
  <script src="talk-runtime.js"></script>
  <script src="talk-room-calendar-store.js"></script>
  <script src="talk-room-calendar-demo-seed.js"></script>
  <script src="talk-sub-nav.js"></script>
  <script src="talk-calendar.js"></script>
  <link rel="stylesheet" href="tasful-site-assistant.css">
  <script src="tasful-site-assistant-adapter.js" defer></script>
  <script src="tasful-site-assistant.js" defer></script>
</body>
</html>
