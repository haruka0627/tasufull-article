<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>商品を探す | TASFUL市場</title>
  <!-- ローカル確認: npm run dev → http://localhost:5173/shop-search.html （file:// 直開き不可） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tasu-banner.css">
  <link rel="stylesheet" href="shop-market-top.css">
  <link rel="stylesheet" href="shop-market-header.css">
  <link rel="stylesheet" href="shop-market-search.css">
  <link rel="stylesheet" href="shop-market-pc.css">
  <link rel="stylesheet" href="common-breadcrumb.css">
</head>
<body class="tasful-market-page tasful-market-search-page" data-page="shop_market_search">
  <header class="tasful-market-mall-header" data-tasful-market-header aria-label="TASFUL市場">
    <div class="tasful-market-mall-header__stack">
      <div class="tasful-market-mall-header__top">
        <a href="shop-store.html" class="tasful-market-mall-header__logo" aria-label="TASFUL市場トップ">
          <span class="tasful-market-mall-header__logo-mark" aria-hidden="true">T</span>
          <span class="tasful-market-mall-header__logo-text">TASFUL<em>市場</em></span>
        </a>
        <div class="tasful-market-mall-header__actions">
          <a href="shop-market-mypage.html" class="tasful-market-mall-header__account" aria-label="マイページ">
            <span class="tasful-market-mall-header__account-icon" aria-hidden="true">👤</span>
            <span class="tasful-market-mall-header__account-label">マイページ</span>
          </a>
          <a href="shop-market-cart.html" class="tasful-market-mall-header__cart" aria-label="カート">
            <span class="tasful-market-mall-header__cart-icon" aria-hidden="true">🛒</span>
            <span class="tasful-market-mall-header__cart-badge" data-tasful-market-cart-count hidden>0</span>
            <span class="tasful-market-mall-header__cart-label">カート</span>
          </a>
        </div>
      </div>
      <div class="tasful-market-mall-header__search-row">
        <form class="tasful-market-mall-header__search" role="search" data-tasful-market-search-form action="shop-search.html" method="get">
          <input
            type="search"
            name="keyword"
            class="tasful-market-mall-header__search-input"
            data-tasful-market-search-input
            placeholder="商品名・キーワードで検索"
            aria-label="商品名・キーワードで検索"
          >
          <button type="submit" class="tasful-market-mall-header__search-btn" aria-label="検索">
            <span aria-hidden="true">🔍</span>
          </button>
        </form>
      </div>
    </div>
    <nav class="tasful-market-mall-header__nav" aria-label="市場カテゴリ">
      <div class="tasful-market-mall-header__nav-scroll" data-tasful-market-nav></div>
    </nav>
  </header>

  <div class="tasful-market-search-shell">
    <nav data-breadcrumb aria-label="パンくず"></nav>
    <div class="tasful-market-search-layout">
      <aside class="tasful-market-search-filters-panel" data-tasful-market-search-filters-panel aria-label="絞り込み"></aside>

      <div class="tasful-market-search-center">
    <main class="tasful-market-search-main" aria-label="検索結果">
      <div class="tasful-market-search-toolbar">
        <p class="tasful-market-search-toolbar__hit" data-tasful-market-search-hit-count aria-live="polite"></p>
        <label class="tasful-market-search-sort">
          <span class="visually-hidden">並び替え</span>
          <select class="tasful-market-search-sort__select" data-tasful-market-search-sort aria-label="並び替え">
            <option value="recommended">並び替え：おすすめ</option>
            <option value="new">並び替え：新着</option>
            <option value="price_asc">並び替え：価格が安い</option>
            <option value="reviews">並び替え：レビューが多い</option>
          </select>
        </label>
      </div>

      <div class="tasful-market-search-filters" data-tasful-market-search-filters aria-label="絞り込み"></div>

      <p class="tasful-market-search-empty" data-tasful-market-search-empty hidden>条件に一致する商品がありません。</p>

      <div class="tasful-market-search-grid" data-tasful-market-search-grid aria-live="polite"></div>

      <nav class="tasful-market-search-pagination" data-tasful-market-search-pagination aria-label="ページ送り" hidden></nav>

      <section class="tasful-market-search-shelf tasful-market-search-shelf--mobile-only" aria-label="よく閲覧される商品">
        <div class="tasful-market-search-shelf__head">
          <h2 class="tasful-market-search-shelf__title">よく閲覧される商品</h2>
        </div>
        <div class="tasful-market-search-shelf__scroll" data-tasful-market-search-browsed></div>
      </section>

      <section class="tasful-market-search-shelf tasful-market-search-shelf--mobile-only" aria-label="最近見た商品">
        <div class="tasful-market-search-shelf__head">
          <h2 class="tasful-market-search-shelf__title">最近見た商品</h2>
        </div>
        <div class="tasful-market-search-shelf__scroll" data-tasful-market-search-recent></div>
      </section>

      <section class="tasful-market-search-shelf tasful-market-search-shelf--mobile-only" aria-label="関連ブランド・出品者">
        <div class="tasful-market-search-shelf__head">
          <h2 class="tasful-market-search-shelf__title">関連ブランド/出品者</h2>
        </div>
        <div class="tasful-market-search-shelf__sellers" data-tasful-market-search-sellers></div>
      </section>

      <div class="tasful-market-search-pc-bottom" data-tasful-market-search-pc-bottom>
        <section class="tasful-market-search-pc-bottom__block" aria-label="関連ブランド">
          <h2 class="tasful-market-search-pc-bottom__title">検索内容に関連したブランド</h2>
          <div class="tasful-market-search-pc-bottom__brands" data-tasful-market-search-brands-pc></div>
        </section>
        <section class="tasful-market-search-pc-bottom__block" aria-label="閲覧履歴">
          <h2 class="tasful-market-search-pc-bottom__title">閲覧履歴</h2>
          <div class="tasful-market-search-pc-bottom__history" data-tasful-market-search-history-pc></div>
        </section>
      </div>
    </main>
      </div>

      <aside class="tasful-market-search-cart-rail" data-tasful-market-search-cart-rail aria-label="カート"></aside>
    </div>
  </div>

  <footer class="tasful-market-footer tasful-market-footer--search" aria-label="TASFUL市場フッター">
    <div class="tasful-market-footer__inner">
      <div class="tasful-market-footer__brand-block">
        <p class="tasful-market-footer__brand">TASFUL市場</p>
        <p class="tasful-market-footer__lead">安心して売買できる</p>
        <p class="tasful-market-footer__sub">TASFULのショッピングマーケット</p>
      </div>

      <nav class="tasful-market-footer__block" aria-labelledby="tasful-market-search-footer-guide">
        <h2 class="tasful-market-footer__heading" id="tasful-market-search-footer-guide">ご利用ガイド</h2>
        <ul class="tasful-market-footer__links">
          <li><span>配送について（準備中）</span></li>
          <li><span>返品・キャンセル（準備中）</span></li>
          <li><a href="/company/faq.html">よくある質問</a></li>
          <li><a href="/iwasho/contact.html">お問い合わせ</a></li>
        </ul>
      </nav>

      <nav class="tasful-market-footer__block" aria-labelledby="tasful-market-search-footer-seller">
        <h2 class="tasful-market-footer__heading" id="tasful-market-search-footer-seller">出品する</h2>
        <ul class="tasful-market-footer__links">
          <li><a href="post.html?scope=business">出店ガイド</a></li>
          <li><a href="builder/mvp-partner-register.html">Connect認証について</a></li>
        </ul>
      </nav>

      <p class="tasful-market-footer__copy">© TASFUL</p>
    </div>
  </footer>

  <div data-tasful-market-tabbar-mount></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat-supabase-config.js"></script>
  <script src="tasu-supabase-client.js"></script>
  <script src="business-categories.js"></script>
  <script src="listing-renderer.js"></script>
  <script src="shop-store-products-db.js"></script>
  <script src="business-listings-db.js"></script>
  <script src="business-board-demo.js"></script>
  <script src="shop-store-demo.js"></script>
  <script src="listing-local-store.js"></script>
  <script src="shop-detail-category.js"></script>
  <script src="detail-shop-store-loader.js"></script>
  <script src="shop-market-product-data.js"></script>
  <script src="shop-market-header.js"></script>
  <script src="shop-market-tabbar.js"></script>
  <script src="breadcrumb-config.js"></script>
  <script src="common-breadcrumb.js"></script>
  <script src="shop-market-search.js"></script>
  <link rel="stylesheet" href="tasful-site-assistant.css">
  <script src="tasful-site-assistant-adapter.js" defer></script>
  <script src="tasful-site-assistant.js" defer></script>
</body>
</html>
