<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>注文確認 | TASFUL 店舗・販売</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tasu-banner.css">
  <link rel="stylesheet" href="shop-market-checkout.css">
  <link rel="stylesheet" href="shop-market-pc.css">
  <link rel="stylesheet" href="shop-vendors-brand.css">
  <link rel="stylesheet" href="shop-store-flow.css">
  <link rel="stylesheet" href="shop-store-checkout.css">
  <link rel="stylesheet" href="tasful-ai-logo.css?v=4">
</head>
<body class="shop-store-flow-page shop-store-list-page tasful-shop-mall-brand" data-page="shop_store_checkout">

  <div class="tasu-banner">
    <div class="tasu-text">
      🚀 <span class="logo">TASFUL</span>プラットフォームへようこそ　
      <a href="shop-vendors.html" class="link">店舗・販売一覧</a>
    </div>
  </div>

  <header class="shop-market-header shop-store-market-header" data-shop-store-market-header aria-label="サイトヘッダー">
    <div class="shop-market-header__inner">
      <a href="shop-vendors.html" class="tasful-ai-logo shop-market-header__logo" aria-label="TASFUL 店舗・販売 TOP">
        <img src="images/tasful-globe-logo.png" alt="TASFUL" class="tasful-ai-logo-icon">
        <div class="tasful-ai-logo-text">
          <span class="main">TASFUL</span>
          <span class="sub">店舗・販売</span>
        </div>
      </a>
      <div class="shop-market-header__actions">
        <a href="shop-store-cart.html" class="shop-market-header__action shop-market-header__action--cart" aria-label="カート">
          <span class="shop-market-header__action-icon" aria-hidden="true">🛒</span>
          <span class="shop-market-header__action-label">カート</span>
        </a>
      </div>
    </div>
  </header>

  <main class="shop-store-flow-main tasful-market-checkout-main" aria-label="注文確認">
    <h1 class="shop-store-flow-main__title tasful-market-checkout-main__title">注文確認</h1>
    <p class="shop-store-flow-status tasful-market-checkout-main__status" data-shop-store-checkout-status hidden></p>

    <div class="tasful-market-checkout-layout" data-shop-store-checkout-layout hidden>
      <div class="tasful-market-checkout-body" data-shop-store-checkout-body hidden>
        <div class="shop-store-checkout-summary" data-shop-store-checkout-summary>
          <section class="tasful-market-checkout-section shop-store-checkout-summary__items" aria-label="注文商品">
            <h2 class="tasful-market-checkout-section__title">注文商品</h2>
            <div class="tasful-market-checkout-items" data-shop-store-checkout-items></div>
          </section>

          <section class="tasful-market-checkout-section tasful-market-checkout-totals shop-store-checkout-summary__totals" aria-label="合計">
            <h2 class="tasful-market-checkout-section__title">合計</h2>
            <dl class="tasful-market-checkout-totals__list" data-shop-store-checkout-totals></dl>
          </section>
        </div>

        <section class="tasful-market-checkout-section" aria-label="お届け先">
          <div class="tasful-market-checkout-section__head">
            <h2 class="tasful-market-checkout-section__title">お届け先</h2>
            <button type="button" class="tasful-market-checkout-section__change" data-shop-store-checkout-address-change>変更</button>
          </div>
          <address class="tasful-market-checkout-address" data-shop-store-checkout-address></address>
        </section>

        <section class="tasful-market-checkout-section" aria-label="配送・受け渡し">
          <h2 class="tasful-market-checkout-section__title">配送・受け渡し</h2>
          <div class="shop-store-delivery shop-store-delivery--checkout" data-shop-store-checkout-delivery></div>
        </section>

        <section class="tasful-market-checkout-section shop-store-checkout-payment-section" aria-label="支払い方法">
          <h2 class="tasful-market-checkout-section__title">支払い方法</h2>
          <div class="tasful-market-checkout-payment" data-shop-store-checkout-payment role="radiogroup" aria-label="支払い方法を選択">
            <label class="tasful-market-checkout-payment__option">
              <input type="radio" name="payment" value="card" checked>
              <span class="tasful-market-checkout-payment__label">クレジットカード</span>
              <span class="tasful-market-checkout-payment__sub">Stripe Connect（デモ）</span>
            </label>
            <label class="tasful-market-checkout-payment__option">
              <input type="radio" name="payment" value="cvs">
              <span class="tasful-market-checkout-payment__label">コンビニ払い</span>
            </label>
            <label class="tasful-market-checkout-payment__option">
              <input type="radio" name="payment" value="bank">
              <span class="tasful-market-checkout-payment__label">銀行振込</span>
            </label>
          </div>
        </section>
      </div>

      <div class="tasful-market-checkout-bar tasful-market-checkout-bar--aside" data-shop-store-checkout-bar hidden>
        <p class="tasful-market-checkout-bar__summary" data-shop-store-checkout-bar-summary></p>
        <button type="button" class="tasful-market-checkout-bar__btn shop-store-flow-btn shop-store-flow-btn--primary" data-shop-store-checkout-submit-aside>注文を確定する</button>
      </div>
    </div>
  </main>

  <div class="tasful-market-checkout-bar tasful-market-checkout-bar--mobile" data-shop-store-checkout-bar-mobile hidden>
    <p class="tasful-market-checkout-bar__summary" data-shop-store-checkout-bar-summary></p>
    <button type="button" class="tasful-market-checkout-bar__btn shop-store-flow-btn shop-store-flow-btn--primary" data-shop-store-checkout-submit>注文を確定する</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat-supabase-config.js"></script>
  <script src="tasu-supabase-client.js"></script>
  <script src="business-categories.js"></script>
  <script src="listing-renderer.js"></script>
  <script src="shop-store-products-db.js"></script>
  <script src="business-listings-db.js"></script>
  <script src="business-board-demo.js"></script>
  <script src="shop-store-demo.js"></script>
  <script src="listing-local-store.js"></script>
  <script src="shop-detail-category.js"></script>
  <script src="detail-shop-store-loader.js"></script>
  <script src="shop-products-config.js"></script>
  <script src="shop-store-delivery-info.js"></script>
  <script src="shop-market-product-data.js"></script>
  <script src="platform-notify-action-labels.js"></script>
  <script src="talk-official-rooms.js"></script>
  <script src="talk-notifications-store.js"></script>
  <script src="shop-market-notify.js"></script>
  <script src="shop-store-product-resolve.js"></script>
  <script src="shop-store-checkout.js"></script>
</body>
</html>
