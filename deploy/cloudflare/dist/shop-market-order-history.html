<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>注文履歴 | TASFUL市場</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tasu-banner.css">
  <link rel="stylesheet" href="shop-market-top.css">
  <link rel="stylesheet" href="shop-market-header.css">
  <link rel="stylesheet" href="shop-market-order-history.css">
  <link rel="stylesheet" href="shop-market-pc.css">
</head>
<body class="tasful-market-page tasful-market-order-history-page" data-page="shop_market_order_history">
  <header class="tasful-market-mall-header" data-tasful-market-header aria-label="TASFUL市場">
    <div class="tasful-market-mall-header__stack">
      <div class="tasful-market-mall-header__top">
        <a href="shop-store.html" class="tasful-market-mall-header__logo" aria-label="TASFUL市場トップ">
          <span class="tasful-market-mall-header__logo-mark" aria-hidden="true">T</span>
          <span class="tasful-market-mall-header__logo-text">TASFUL<em>市場</em></span>
        </a>
        <div class="tasful-market-mall-header__actions">
          <a href="shop-market-mypage.html" class="tasful-market-mall-header__account" aria-label="マイページ">
            <span class="tasful-market-mall-header__account-icon" aria-hidden="true">👤</span>
            <span class="tasful-market-mall-header__account-label">マイページ</span>
          </a>
          <a href="shop-market-cart.html" class="tasful-market-mall-header__cart" aria-label="カート">
            <span class="tasful-market-mall-header__cart-icon" aria-hidden="true">🛒</span>
            <span class="tasful-market-mall-header__cart-badge" data-tasful-market-cart-count hidden>0</span>
            <span class="tasful-market-mall-header__cart-label">カート</span>
          </a>
        </div>
      </div>
      <div class="tasful-market-mall-header__search-row">
        <form class="tasful-market-mall-header__search" role="search" data-tasful-market-search-form action="shop-search.html" method="get">
          <input type="search" name="keyword" class="tasful-market-mall-header__search-input" data-tasful-market-search-input placeholder="商品名・キーワードで検索" aria-label="商品名・キーワードで検索">
          <button type="submit" class="tasful-market-mall-header__search-btn" aria-label="検索"><span aria-hidden="true">🔍</span></button>
        </form>
      </div>
    </div>
    <nav class="tasful-market-mall-header__nav" aria-label="市場カテゴリ">
      <div class="tasful-market-mall-header__nav-scroll" data-tasful-market-nav></div>
    </nav>
  </header>

  <main class="tasful-market-order-history-main" aria-label="注文履歴">
    <h1 class="tasful-market-order-history-main__title">注文履歴</h1>
    <p class="tasful-market-order-history-main__count" data-tasful-order-history-count hidden></p>

    <div class="tasful-market-order-history-toolbar" data-tasful-order-history-toolbar hidden>
      <form class="tasful-market-order-history-search" role="search" data-tasful-order-history-search-form>
        <span class="tasful-market-order-history-search__icon" aria-hidden="true">🔍</span>
        <input
          type="text"
          class="tasful-market-order-history-search__input"
          data-tasful-order-history-search
          placeholder="注文履歴を検索"
          aria-label="注文履歴を検索"
          inputmode="search"
          enterkeyhint="search"
          autocomplete="off"
        />
        <button type="button" class="tasful-market-order-history-search__clear" data-tasful-order-history-search-clear hidden aria-label="検索をクリア">
          <svg class="tasful-market-order-history-search__clear-icon" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true" focusable="false">
            <path d="M3.2 3.2l7.6 7.6M10.8 3.2L3.2 10.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>
      </form>
      <button
        type="button"
        class="tasful-market-order-history-filter-btn"
        data-tasful-order-history-filter-open
        aria-haspopup="dialog"
        aria-controls="tasful-order-history-filter-sheet"
      >
        <span class="tasful-market-order-history-filter-btn__icon" aria-hidden="true">☰</span>
        <span class="tasful-market-order-history-filter-btn__label">絞り込み</span>
        <span class="tasful-market-order-history-filter-btn__badge" data-tasful-order-history-filter-badge hidden></span>
      </button>
    </div>

    <div class="tasful-market-order-history-empty" data-tasful-order-history-empty hidden>
      <p class="tasful-market-order-history-empty__icon" aria-hidden="true">📦</p>
      <p class="tasful-market-order-history-empty__text">まだ購入履歴はありません</p>
      <a href="shop-search.html" class="tasful-market-order-history-empty__btn">商品を探す</a>
    </div>

    <div class="tasful-market-order-history-no-results" data-tasful-order-history-no-results hidden>
      <p class="tasful-market-order-history-no-results__text">条件に一致する注文がありません</p>
      <button type="button" class="tasful-market-order-history-no-results__btn" data-tasful-order-history-clear-filters>絞り込みをクリア</button>
    </div>

    <div class="tasful-market-order-history-list" data-tasful-order-history-list hidden></div>
  </main>

  <div
    class="tasful-market-order-history-sheet"
    id="tasful-order-history-filter-sheet"
    data-tasful-order-history-sheet
    hidden
    aria-hidden="true"
  >
    <button type="button" class="tasful-market-order-history-sheet__backdrop" data-tasful-order-history-sheet-backdrop aria-label="閉じる"></button>
    <div class="tasful-market-order-history-sheet__panel" role="dialog" aria-modal="true" aria-labelledby="tasful-order-history-filter-title">
      <div class="tasful-market-order-history-sheet__handle" aria-hidden="true"></div>
      <header class="tasful-market-order-history-sheet__head">
        <h2 class="tasful-market-order-history-sheet__title" id="tasful-order-history-filter-title">絞り込み</h2>
        <button type="button" class="tasful-market-order-history-sheet__close" data-tasful-order-history-sheet-close aria-label="閉じる">×</button>
      </header>
      <div class="tasful-market-order-history-sheet__body" data-tasful-order-history-filter-body></div>
      <footer class="tasful-market-order-history-sheet__foot">
        <button type="button" class="tasful-market-order-history-sheet__clear" data-tasful-order-history-filter-clear>クリア</button>
        <button type="button" class="tasful-market-order-history-sheet__apply" data-tasful-order-history-filter-apply>適用する</button>
      </footer>
    </div>
  </div>

  <script src="shop-market-product-data.js"></script>
  <script src="shop-market-header.js"></script>
  <script src="shop-market-order-history.js"></script>
</body>
</html>
