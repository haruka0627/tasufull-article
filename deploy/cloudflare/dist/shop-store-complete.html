<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>注文完了 | TASFUL 店舗・販売</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tasu-banner.css">
  <link rel="stylesheet" href="shop-vendors-brand.css">
  <link rel="stylesheet" href="shop-store-flow.css">
  <link rel="stylesheet" href="shop-store-checkout.css">
  <link rel="stylesheet" href="tasful-ai-logo.css?v=4">
</head>
<body class="shop-store-flow-page shop-store-list-page tasful-shop-mall-brand" data-page="shop_store_complete">

  <div class="tasu-banner">
    <div class="tasu-text">
      🚀 <span class="logo">TASFUL</span>プラットフォームへようこそ　
      <a href="shop-vendors.html" class="link">店舗・販売一覧</a>
    </div>
  </div>

  <header class="shop-market-header shop-store-market-header" data-shop-store-market-header aria-label="サイトヘッダー">
    <div class="shop-market-header__inner">
      <a href="shop-vendors.html" class="tasful-ai-logo shop-market-header__logo" aria-label="TASFUL 店舗・販売 TOP">
        <img src="images/tasful-globe-logo.png" alt="TASFUL" class="tasful-ai-logo-icon">
        <div class="tasful-ai-logo-text">
          <span class="main">TASFUL</span>
          <span class="sub">店舗・販売</span>
        </div>
      </a>
    </div>
  </header>

  <main class="shop-store-flow-main" aria-label="注文完了">
    <div class="shop-store-complete-card">
      <p class="shop-store-complete-card__icon" aria-hidden="true">✓</p>
      <h1 class="shop-store-complete-card__title">ご注文ありがとうございます</h1>
      <p class="shop-store-complete-card__lead">店舗販売の注文を受け付けました。</p>
      <div class="shop-store-complete-card__summary" data-shop-store-complete-summary>
        <p class="shop-store-complete-card__shop" data-shop-store-complete-shop>HARU CAFE</p>
        <p class="shop-store-complete-card__product" data-shop-store-complete-product>季節のパンケーキ</p>
        <dl class="shop-store-complete-card__facts">
          <div class="shop-store-complete-card__fact">
            <dt>注文番号</dt>
            <dd data-shop-store-complete-order-id>TS-DEMO</dd>
          </div>
          <div class="shop-store-complete-card__fact">
            <dt>合計</dt>
            <dd data-shop-store-complete-total>¥1,280</dd>
          </div>
        </dl>
      </div>
      <p class="shop-store-complete-card__note">デモ注文のため、実際の決済・発送は行われません。</p>
    </div>
    <div class="shop-store-flow-actions shop-store-complete-actions">
      <a href="detail-shop-store.html?id=demo-shop-haru-cafe" class="shop-store-flow-btn shop-store-flow-btn--primary" data-shop-store-complete-shop-link>店舗を見る</a>
      <a href="shop-vendors.html" class="shop-store-flow-btn shop-store-flow-btn--outline">店舗一覧へ</a>
    </div>
  </main>

  <script src="shop-market-product-data.js"></script>
  <script src="shop-store-product-resolve.js"></script>
  <script src="shop-store-complete.js"></script>
</body>
</html>
