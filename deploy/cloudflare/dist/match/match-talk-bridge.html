<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF8FC" />
  <title>チャットをはじめる | TASFUL MATCH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="match.css" />
</head>
<body class="match-body" data-page="match-talk-bridge" data-match-requires-login="1">
<div class="match-app match-app--phone">
    <header class="match-header" aria-label="ヘッダー">
      <a class="match-brand" href="match-list.html">
        <span class="match-brand__text">
          <span class="match-brand__main">マッチおめでとう！</span>
          <span class="match-brand__sub">TASFUL TALK へ</span>
        </span>
      </a>
    </header>

    <main class="match-main">
      <section class="match-bridge" aria-label="TASFUL TALK接続">
        <div class="match-bridge__illus" aria-hidden="true">💬</div>
        <h1 class="match-bridge__title">マッチが成立しました</h1>
        <p class="match-bridge__desc">ゆいさんとのメッセージは <strong>TASFUL TALK</strong> で行います。既存の安心基盤（AI監視・通報）がそのまま使えます。</p>

        <div class="match-feature-list">
          <article class="match-feature-item">
            <span class="match-feature-item__icon" aria-hidden="true">🛡</span>
            <div>
              <strong>安心のチャット環境</strong>
              <span>AI監視で不適切な連絡先交換をブロック</span>
            </div>
          </article>
          <article class="match-feature-item">
            <span class="match-feature-item__icon" aria-hidden="true">✓</span>
            <div>
              <strong>既読・未読がわかる</strong>
              <span>TASFUL TALK の既存機能を利用</span>
            </div>
          </article>
          <article class="match-feature-item">
            <span class="match-feature-item__icon" aria-hidden="true">📷</span>
            <div>
              <strong>写真・スタンプ送信</strong>
              <span>新規チャットUIは作らず TALK を活用</span>
            </div>
          </article>
          <article class="match-feature-item">
            <span class="match-feature-item__icon" aria-hidden="true">⚑</span>
            <div>
              <strong>通報・ブロック</strong>
              <span>チャット画面からいつでも利用可能</span>
            </div>
          </article>
        </div>

        <div class="match-cta-stack">
          <a class="match-btn match-btn--primary match-btn--block" href="#" data-match-talk-cta>メッセージする</a>
          <a class="match-btn match-btn--text match-btn--block" href="match-list.html">あとで</a>
        </div>

        <a class="match-ai-cta match-ai-cta--mint" data-match-p15-section data-match-ai-cta data-ai-mode="match-date-coach" data-ai-q-template="初デートのプランやマナーについて相談したいです。" href="#">TASFUL AI でデート相談</a>
      </section>
    </main>

    <nav class="match-tabbar" aria-label="メインナビ">
      <div class="match-tabbar__inner">
        <a class="match-tabbar__link" href="match-swipe.html">
          <span class="match-tabbar__icon" aria-hidden="true">💘</span>
          <span>スワイプ</span>
        </a>
        <a class="match-tabbar__link is-active" href="match-list.html">
          <span class="match-tabbar__icon" aria-hidden="true">💞</span>
          <span>マッチ</span>
        </a>
        <a class="match-tabbar__link" href="match-safety.html">
          <span class="match-tabbar__icon" aria-hidden="true">🛡️</span>
          <span>安心</span>
        </a>
        <a class="match-tabbar__link" href="match-mypage.html">
          <span class="match-tabbar__icon" aria-hidden="true">👤</span>
          <span>マイページ</span>
        </a>
      </div>
    </nav>
  </div>
  <div class="match-toast" data-match-toast role="status" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../chat-supabase-config.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="../tasu-supabase-client.js"></script>

  <script src="match-auth.js"></script>
  <script src="match-data-stub.js"></script>
  <script src="match-data-render.js"></script>
  <script src="match-api.js"></script>
  <script src="match-bootstrap.js"></script>
  <script src="match-beta-gate.js"></script>
  <script src="match-login-gate.js"></script>
  <script src="../ai-workspace-links.js"></script>
  <script src="match-ai-cta.js"></script>
  <script src="match-p15-render.js"></script>
  <script src="match-mock.js"></script>
  <script src="match-wiring.js"></script>
  <script src="match-core-wiring.js"></script>
  <script src="match-unmatch-wiring.js"></script>
  <script src="match-p15-wiring.js"></script>
</body>
</html>
