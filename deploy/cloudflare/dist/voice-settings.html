<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>声の設定 | TASFUL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="tasful-app-mobile.css">
  <link rel="stylesheet" href="voice-settings.css">
</head>
<body class="dash-body" data-page="voice-settings">
  <div class="dash-app">
    <div class="dash-main">
      <main class="dash-content dash-shell">
        <header class="tasu-mobile-page-head">
          <a class="tasu-mobile-page-head__back" href="profile-settings.html" aria-label="戻る">←</a>
          <h1 class="tasu-mobile-page-head__title">声の設定</h1>
        </header>
        <p class="tasu-mobile-page-lead">AI読み上げに使う声を選べます。設定は端末に保存されます（Web Speech API）。</p>

        <section class="tasu-voice-settings-card" aria-labelledby="voiceGeneralTitle">
          <h2 class="tasu-voice-settings-card__title" id="voiceGeneralTitle">読み上げ</h2>
          <p class="tasu-voice-settings-card__sub">生成AI の応答読み上げ ON/OFF（既存トグルと同期）</p>
          <label class="tasu-voice-settings-toggle">
            <input type="checkbox" data-voice-settings-enabled checked />
            <span>音声読み上げを有効にする</span>
          </label>
          <div class="tasu-voice-settings-sliders" data-voice-settings-sliders>
            <div class="tasu-voice-settings-slider">
              <label>
                <span>速度 <span data-voice-settings-rate-val>1.0</span></span>
                <input type="range" min="0.5" max="2" step="0.1" value="1" data-voice-settings-rate />
              </label>
            </div>
            <div class="tasu-voice-settings-slider">
              <label>
                <span>ピッチ <span data-voice-settings-pitch-val>1.0</span></span>
                <input type="range" min="0.5" max="2" step="0.1" value="1" data-voice-settings-pitch />
              </label>
            </div>
            <div class="tasu-voice-settings-slider">
              <label>
                <span>音量 <span data-voice-settings-volume-val>1.0</span></span>
                <input type="range" min="0" max="1" step="0.05" value="1" data-voice-settings-volume />
              </label>
            </div>
          </div>
        </section>

        <section class="tasu-voice-settings-card" aria-labelledby="voiceStandardTitle">
          <h2 class="tasu-voice-settings-card__title" id="voiceStandardTitle">標準音声（無料）</h2>
          <p class="tasu-voice-settings-card__sub">ブラウザの日本語音声から最も近い声を自動で選びます。</p>
          <ul class="tasu-voice-list" data-voice-settings-standard-list role="radiogroup" aria-label="標準音声"></ul>
        </section>

        <section class="tasu-voice-settings-card" aria-labelledby="voicePremiumTitle">
          <h2 class="tasu-voice-settings-card__title" id="voicePremiumTitle">プレミアム音声</h2>
          <p class="tasu-voice-settings-card__sub">高品質・キャラクター音声は準備中です。</p>
          <ul class="tasu-voice-list" data-voice-settings-premium-list aria-label="プレミアム音声"></ul>
        </section>

        <div class="tasu-voice-settings-actions">
          <button type="button" class="dash-btn dash-btn--primary" data-voice-settings-save>設定を保存</button>
        </div>
        <p class="tasu-voice-settings-toast" data-voice-settings-toast hidden role="status">保存しました</p>

        <nav class="tasu-app-tabbar" data-tasu-app-tabbar aria-label="アプリメニュー">
          <a class="tasu-app-tabbar__item" href="dashboard.html" data-tasu-app-tab="home">
            <span class="tasu-app-tabbar__icon" aria-hidden="true">🏠</span>
            <span class="tasu-app-tabbar__label">ホーム</span>
          </a>
          <a class="tasu-app-tabbar__item" href="talk-home.html?tab=chat" data-tasu-app-tab="chat">
            <span class="tasu-app-tabbar__icon" aria-hidden="true">💬</span>
            <span class="tasu-app-tabbar__label">TALK</span>
          </a>
          <a class="tasu-app-tabbar__item" href="gen-ai-workspace.html" data-tasu-app-tab="ai">
            <span class="tasu-app-tabbar__icon" aria-hidden="true">✨</span>
            <span class="tasu-app-tabbar__label">AI</span>
          </a>
          <a class="tasu-app-tabbar__item" href="profile-settings.html" data-tasu-app-tab="mypage">
            <span class="tasu-app-tabbar__icon" aria-hidden="true">👤</span>
            <span class="tasu-app-tabbar__label">マイページ</span>
          </a>
        </nav>
      </main>
    </div>
  </div>
  <script src="scripts/tasu-voice-catalog.js"></script>
  <script src="scripts/tasu-voice-preferences.js"></script>
  <script src="ai-concierge.js"></script>
  <script src="tasful-app-mobile.js"></script>
  <script src="voice-settings.js"></script>
  <script>window.TasufulAppMobile?.init?.({ active: "mypage" });</script>
  <link rel="stylesheet" href="tasful-site-assistant.css">
  <script src="tasful-site-assistant-adapter.js" defer></script>
  <script src="tasful-site-assistant.js" defer></script>
</body>
</html>
