<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ | TASFUL</title>
  <link rel="stylesheet" href="support-trouble-center.css" />
  <style>
    .support-intake { max-width: 560px; margin: 2rem auto; padding: 1rem; }
    .support-intake label { display: block; margin-bottom: 0.75rem; font-size: 0.875rem; }
    .support-intake input, .support-intake textarea {
      width: 100%; margin-top: 0.25rem; padding: 0.5rem; border-radius: 8px;
      border: 1px solid #2d3a4f; background: #1a2332; color: #e8eef7;
    }
    .support-intake button {
      margin-top: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 8px;
      background: #f97316; color: #fff; border: none; font-weight: 700; cursor: pointer;
    }
    .support-intake-result { margin-top: 1rem; padding: 0.75rem; border-radius: 8px; background: #1a2332; font-size: 0.875rem; }
  </style>
</head>
<body class="support-trouble-page" data-page="support-intake">
  <main class="support-intake">
    <h1>お問い合わせ</h1>
    <p style="color:#94a3b8;font-size:0.875rem;">軽いご質問はAIが一次返信します。返金・法務等は運営が確認します。</p>
    <form data-support-intake-form>
      <label>タイトル<input type="text" name="title" data-support-title required /></label>
      <label>内容<textarea name="body" rows="6" data-support-body required></textarea></label>
      <button type="submit">送信</button>
    </form>
    <div class="support-intake-result" data-support-intake-result hidden></div>
    <p style="margin-top:1.5rem;"><a href="support-trouble-center.html" style="color:#f97316;">運営: トラブルセンター</a></p>
  </main>
  <script src="support-ticket-classifier.js"></script>
  <script src="support-ticket-ai-reply.js"></script>
  <script src="support-admin-notify.js"></script>
  <script src="support-ticket-store.js"></script>
  <script src="support-ticket-service.js"></script>
  <script>
    (function () {
      const form = document.querySelector("[data-support-intake-form]");
      const result = document.querySelector("[data-support-intake-result]");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        const title = form.querySelector("[data-support-title]").value;
        const body = form.querySelector("[data-support-body]").value;
        const out = TasuSupportTicketService.submitInquiry({
          user_id: "intake_user",
          title,
          body,
          source: "web_form",
        });
        result.hidden = false;
        result.textContent =
          "受付ID: " + out.ticket.id +
          " / 分類: " + out.ticket.category +
          " / 重要度: " + out.ticket.severity +
          " / ステータス: " + out.ticket.status +
          (out.ticket.ai_suggested_reply ? "\n\n【AI返信案】" + out.ticket.ai_suggested_reply : "");
      });
    })();
  </script>
</body>
</html>
