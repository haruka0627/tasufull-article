  <script>

    (function () {

      function showLoadIssue(message) {

        const status = document.querySelector("[data-listing-detail-status]");

        const root = document.getElementById("business-service-detail-root");

        if (status) {

          status.hidden = false;

          status.className = "listing-detail-status listing-detail-status--error";

          status.innerHTML = message;

        }

        if (root) root.hidden = false;

        document.body.dataset.listingLoaded = "error";

      }

      window.addEventListener("error", function () {

        if (document.body.dataset.listingLoaded === "true") return;

        showLoadIssue("スクリプトの読み込みに失敗しました。");

      });

      setTimeout(function () {

        if (document.body.dataset.listingLoaded === "true") return;

        if (document.body.dataset.detailType === "general") {
          window.TasuDetailGeneralLoader?.boot?.();
        } else {
          window.TasuDetailBusinessServiceLoader?.mountBusinessServiceLayout?.();
          showLoadIssue("読み込めませんでした。ページを再読み込みするか、一覧から再度お開きください。");
        }

      }, 10000);

    })();

  </script>
