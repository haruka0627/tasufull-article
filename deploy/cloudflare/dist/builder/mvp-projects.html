<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>案件一覧 | TASFUL Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-mvp-projects">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="./index.html" aria-label="Builderダッシュボードへ">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" />
                <path d="m12 19-7-7 7-7" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder</span>
              <span class="builder-brand__sub">案件一覧（MVP）</span>
            </span>
          </a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">案件一覧 | TASFUL Builder <span class="mvp-headerTag" aria-hidden="true">MANAGEMENT</span></h1>
          <p class="builder-header__sub">案件管理ダッシュボード・進行と応募の一元管理</p>
        </div>

        <div class="builder-role" data-builder-role></div>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main">
      <section class="mvp-stats" aria-label="実績・状況">
        <div class="mvp-stats__grid">
          <div class="mvp-statCard">
            <div class="mvp-statCard__label">進行中のプロジェクト</div>
            <div class="mvp-statCard__value is-lg" data-mvp-stat-inprogress>28</div>
          </div>
          <div class="mvp-statCard">
            <div class="mvp-statCard__label">
              登録協力会社 <span class="mvp-statCard__miniIcon" aria-hidden="true">🤝</span>
            </div>
            <div class="mvp-statCard__value is-lg" data-mvp-stat-partners>54</div>
          </div>
          <div class="mvp-statCard">
            <div class="mvp-statCard__label">新しい通知</div>
            <div class="mvp-statCard__value is-strong is-lg is-gloss" data-mvp-stat-unread>3</div>
          </div>
          <div class="mvp-statCard">
            <div class="mvp-statCard__label">
              今月の発注金額 <span class="mvp-statCard__delta is-up">+12.5%</span>
            </div>
            <div class="mvp-statCard__value" data-mvp-stat-monthly>¥2,400,000</div>
          </div>
        </div>
      </section>

      <section class="builder-panel mvp-panel" aria-label="ショートカット">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">ショートカット</h2>
          <div class="mvp-panelTools">
            <button type="button" class="mvp-toggle" aria-label="切替（ダミー）" aria-checked="false" role="switch">
              <span class="mvp-toggle__track"><span class="mvp-toggle__thumb"></span></span>
              <span class="mvp-toggle__label">OFF</span>
            </button>
            <span class="builder-kpi" data-builder-mvp-kpi>—</span>
          </div>
        </div>
        <div class="mvp-shortcuts" aria-label="ショートカット">
          <a class="mvp-shortcut" href="mvp-project-new.html" data-builder-mvp-new-project>
            <span class="mvp-shortcut__icon" aria-hidden="true">＋</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">案件投稿</span>
              <span class="mvp-shortcut__sub">新規の案件を作成</span>
            </span>
          </a>
          <a class="mvp-shortcut" href="mvp-partner-register.html" data-builder-mvp-partner-register>
            <span class="mvp-shortcut__icon" aria-hidden="true">🤝</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">協力会社登録</span>
              <span class="mvp-shortcut__sub">パートナー情報を追加</span>
            </span>
          </a>
          <a class="mvp-shortcut" href="mvp-notifications.html" data-builder-mvp-notifications>
            <span class="mvp-shortcut__icon" aria-hidden="true">🔔</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">通知</span>
              <span class="mvp-shortcut__sub">更新を確認</span>
            </span>
          </a>
          <a class="mvp-shortcut" href="mvp-calendar.html" data-builder-mvp-calendar>
            <span class="mvp-shortcut__icon" aria-hidden="true">🗓️</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">カレンダー</span>
              <span class="mvp-shortcut__sub">予定を一覧</span>
            </span>
          </a>
        </div>
      </section>

      <section class="builder-panel mvp-panel" aria-label="案件一覧">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">一覧</h2>
          <div class="mvp-panelTools">
            <button type="button" class="mvp-toggle is-on" aria-label="切替（ダミー）" aria-checked="true" role="switch">
              <span class="mvp-toggle__track"><span class="mvp-toggle__thumb"></span></span>
              <span class="mvp-toggle__label">ON</span>
            </button>
            <span class="builder-kpi" data-builder-mvp-project-count>—</span>
          </div>
        </div>
        <div class="mvp-project-grid" data-builder-mvp-project-list></div>
      </section>

      <footer class="builder-footer"><p>© 2026 TASFUL inc. All rights reserved. Version 1.2</p></footer>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" }).catch(function () {});
      });
    }
  </script>
    <script src="../talk-runtime.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="builder-actor-identity.js"></script>
    <script src="builder-config.js"></script>
  <script src="builder-mvp-store-local.js"></script>
  <script src="builder-repositories-local.js"></script>
  <script src="builder-repositories-supabase.js"></script>
  <script src="builder-actor-resolver.js"></script>
  <script src="builder-session.js"></script>
  <script src="builder-data-provider.js"></script>
  <script src="builder-repository.js"></script>
    <script src="builder-partner-adapter.js"></script>
  <script src="builder-storage-adapter.js"></script>
  <script src="builder-pdf-adapter.js"></script>

  <script src="builder-event-hub.js"></script>
  <script src="builder-notification-adapter.js"></script>
  <script src="builder-ai-adapter.js"></script>
  <script src="builder-ai-tools.js"></script>
  <script src="builder-ai-tool-router.js"></script>
  <script src="builder-ai-core.js"></script>
  <script src="builder-b3-init.js"></script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
</body>
</html>
