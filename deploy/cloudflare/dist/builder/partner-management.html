<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c0f1d" />
  <title>協力パートナー管理 | Builder Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-partner-management">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder Admin ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="../builder-admin/admin-index.html" aria-label="Builder Adminダッシュボード">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 21h18" />
                <path d="M7 21V7l8-4v18" />
                <path d="M17 21V11l-6-4" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder Admin</span>
              <span class="builder-brand__sub">TASFUL 運営</span>
            </span>
          </a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">協力パートナー管理</h1>
          <p class="builder-header__sub">
            登録申請の審査・書類確認（P1）
            <span class="builder-prt-mode-chip" data-prt-mgmt-mode></span>
          </p>
          <a class="builder-admin-back" href="../builder-admin/admin-index.html">運営ダッシュボードへ</a>
        </div>

        <a class="builder-account" href="../dashboard.html" aria-label="TASFUL会員ダッシュボードへ">
          <img class="builder-account__avatar" data-dash-avatar src="https://placehold.co/64x64/fff7ed/c2410c?text=AD" width="40" height="40" alt="" />
          <span class="builder-account__text">
            <span class="builder-account__name" data-dash-user-name>運営</span>
            <span class="builder-account__sub" data-builder-member-type>TASFUL運営</span>
          </span>
          <svg class="builder-account__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </a>
      </div>
    </header>

    <main class="builder-shell builder-main" data-builder-main>
      <nav data-breadcrumb aria-label="パンくず"></nav>
      <section class="builder-stat-grid builder-prt-stat-grid" aria-label="登録サマリー">
        <article class="builder-stat-card">
          <div class="builder-stat-card__icon builder-stat-card__icon--amber" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" />
            </svg>
          </div>
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">審査待ち</span>
            <strong class="builder-stat-card__value" data-prt-mgmt-stat-pending>0</strong>
            <span class="builder-stat-card__desc">新規申請・未審査</span>
          </div>
        </article>

        <article class="builder-stat-card">
          <div class="builder-stat-card__icon builder-stat-card__icon--slate" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
              <path d="M12 9v4" /><path d="M12 17h.01" />
            </svg>
          </div>
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">保留</span>
            <strong class="builder-stat-card__value" data-prt-mgmt-stat-hold>0</strong>
            <span class="builder-stat-card__desc">追加確認・書類待ち</span>
          </div>
        </article>

        <article class="builder-stat-card">
          <div class="builder-stat-card__icon builder-stat-card__icon--orange" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><path d="m22 4-10 10.01-3-3" />
            </svg>
          </div>
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">承認</span>
            <strong class="builder-stat-card__value" data-prt-mgmt-stat-approved>0</strong>
            <span class="builder-stat-card__desc">審査通過済み</span>
          </div>
        </article>

        <article class="builder-stat-card">
          <div class="builder-stat-card__icon builder-stat-card__icon--orange" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <path d="M14 2v6h6" /><path d="M16 13H8" /><path d="M16 17H8" /><path d="M10 9H8" />
            </svg>
          </div>
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">契約済み</span>
            <strong class="builder-stat-card__value" data-prt-mgmt-stat-contracted>0</strong>
            <span class="builder-stat-card__desc">電子契約完了（表示のみ）</span>
          </div>
        </article>
      </section>

      <section class="builder-panel builder-admin-filter-panel" aria-label="検索・絞り込み">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">検索・絞り込み</h2>
          <span class="builder-kpi" data-prt-mgmt-count>0件</span>
        </div>
        <form class="builder-search builder-admin-search-form" data-prt-mgmt-filter>
          <label class="builder-field builder-field--full">
            <span class="builder-field__label">キーワード</span>
            <input class="builder-input" type="search" name="q" placeholder="会社名・屋号・担当者名…" data-prt-mgmt-search-q />
          </label>
          <label class="builder-field">
            <span class="builder-field__label">流入元</span>
            <select class="builder-select" name="source" data-prt-mgmt-search-source>
              <option value="">すべて</option>
              <option value="iwasho">IWASHO</option>
              <option value="tasful">TASFUL</option>
              <option value="builder">Builder</option>
            </select>
          </label>
          <label class="builder-field">
            <span class="builder-field__label">ステータス</span>
            <select class="builder-select" name="status" data-prt-mgmt-search-status>
              <option value="">すべて</option>
              <option value="pending">審査待ち</option>
              <option value="hold">保留</option>
              <option value="approved">承認</option>
              <option value="rejected">否認</option>
              <option value="contracted">契約済み</option>
            </select>
          </label>
          <div class="builder-form__actions">
            <button type="button" class="builder-btn builder-btn--primary" data-prt-mgmt-filter-apply>絞り込み</button>
            <button type="button" class="builder-btn builder-btn--ghost" data-prt-mgmt-filter-reset>リセット</button>
          </div>
        </form>
      </section>

      <section class="builder-panel builder-recent-section" aria-label="登録申請一覧">
        <div class="builder-recent-section__head">
          <h2 class="builder-section-title">登録申請一覧</h2>
        </div>
        <ul class="builder-prt-app-grid" data-prt-mgmt-table data-prt-mgmt-tbody></ul>
      </section>

      <footer class="builder-footer" aria-label="フッター">
        <p>© 2024 TASFUL inc. All rights reserved. Builder Admin</p>
      </footer>
    </main>
  </div>

  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="../chat-supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../tasu-supabase-client.js"></script>
  <script src="../partner-api.js"></script>
  <script src="partner-mock-data.js"></script>
  <script src="partner-management.js" defer></script>
</body>
</html>
