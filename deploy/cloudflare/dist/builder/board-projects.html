<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f97316" />
  <title>掲示板一覧 | TASFUL Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
  <link rel="stylesheet" href="../tasful-app-mobile.css" />
</head>
<body class="builder-body" data-page="builder-board-projects">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="./user-dashboard.html" aria-label="一般ダッシュボードへ">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" />
                <path d="m12 19-7-7 7-7" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder</span>
              <span class="builder-brand__sub">掲示板</span>
            </span>
          </a>
          <a class="builder-page-back" href="user-dashboard.html" data-builder-page-back aria-label="一般ダッシュボードへ">‹ ダッシュボード</a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">掲示板</h1>
          <p class="builder-header__sub">案件・ワーカー投稿の共通一覧</p>
        </div>

        <div class="builder-role" data-builder-role></div>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main">
      <section class="builder-panel mvp-panel" aria-label="ショートカット">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">掲示板メニュー</h2>
          <div class="mvp-panelTools">
            <span class="builder-kpi" data-builder-board-kpi>—</span>
          </div>
        </div>
        <div class="mvp-shortcuts" aria-label="ショートカット">
          <a class="mvp-shortcut" href="mvp-project-new.html">
            <span class="mvp-shortcut__icon" aria-hidden="true">＋</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">案件を投稿</span>
              <span class="mvp-shortcut__sub">案件を新規作成</span>
            </span>
          </a>
          <a class="mvp-shortcut" href="board-threads.html" data-builder-board-threads-link>
            <span class="mvp-shortcut__icon" aria-hidden="true">💬</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">やり取り</span>
              <span class="mvp-shortcut__sub">やりとりチャット一覧</span>
            </span>
          </a>
          <a class="mvp-shortcut" href="../talk-home.html?tab=notify" data-builder-board-talk-link>
            <span class="mvp-shortcut__icon" aria-hidden="true">🔔</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">TASFUL TALK</span>
              <span class="mvp-shortcut__sub">通知・連絡に戻る</span>
            </span>
          </a>
          <a class="mvp-shortcut" href="mvp-threads.html">
            <span class="mvp-shortcut__icon" aria-hidden="true">📋</span>
            <span class="mvp-shortcut__text">
              <span class="mvp-shortcut__title">運営管理案件</span>
              <span class="mvp-shortcut__sub">TASFUL案件管理</span>
            </span>
          </a>
        </div>
      </section>

      <section class="builder-panel mvp-panel" aria-label="掲示板一覧">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">投稿一覧</h2>
          <div class="mvp-panelTools">
            <span class="builder-kpi" data-builder-board-project-count>—</span>
          </div>
        </div>
        <div class="mvp-board-type-tabs" data-builder-board-type-tabs role="tablist" aria-label="投稿タイプ"></div>
        <div class="mvp-project-grid" data-builder-board-project-list></div>
      </section>

      <footer class="builder-footer"><p>© 2026 TASFUL inc. All rights reserved.</p></footer>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" }).catch(function () {});
      });
    }
  </script>
  <script src="../listing-demo-catalog.js"></script>
    <script src="builder-board-adapter.js"></script>
  <script src="builder-board-feed.js"></script>
    <script src="../talk-runtime.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="builder-actor-identity.js"></script>
    <script src="builder-config.js"></script>
  <script src="builder-mvp-store-local.js"></script>
  <script src="builder-repositories-local.js"></script>
  <script src="builder-repositories-supabase.js"></script>
  <script src="builder-actor-resolver.js"></script>
  <script src="builder-session.js"></script>
  <script src="builder-data-provider.js"></script>
  <script src="builder-repository.js"></script>
    <script src="builder-partner-adapter.js"></script>
  <script src="builder-storage-adapter.js"></script>
  <script src="builder-pdf-adapter.js"></script>

  <script src="builder-event-hub.js"></script>
  <script src="builder-notification-adapter.js"></script>
  <script src="builder-ai-adapter.js"></script>
  <script src="builder-ai-tools.js"></script>
  <script src="builder-ai-tool-router.js"></script>
  <script src="builder-ai-core.js"></script>
  <script src="builder-b3-init.js"></script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
  <script src="builder-conditional-search.js"></script>
  <script src="builder-search-ui-adapter.js"></script>
  <script src="builder-search-repository.js"></script>
  <script src="../tasful-app-mobile.js" defer></script>
  <link rel="stylesheet" href="../tasful-site-assistant.css">
  <script src="../tasful-site-assistant-adapter.js" defer></script>
  <script src="../tasful-site-assistant.js" defer></script>
</body>
</html>
