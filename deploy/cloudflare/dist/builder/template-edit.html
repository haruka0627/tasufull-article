<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>テンプレ編集 | Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-template-edit">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="templates.html" aria-label="案件テンプレへ">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" />
                <path d="m12 19-7-7 7-7" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder</span>
              <span class="builder-brand__sub">テンプレ編集</span>
            </span>
          </a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">テンプレ編集</h1>
          <p class="builder-header__sub">募集要項を雛形として保存</p>
        </div>

        <button type="button" class="builder-account" data-builder-account aria-label="アカウントメニュー">
          <img class="builder-account__avatar" data-dash-avatar src="https://placehold.co/64x64/fff7ed/c2410c?text=BU" width="40" height="40" alt="" />
          <span class="builder-account__text">
            <span class="builder-account__name" data-dash-user-name>会員</span>
            <span class="builder-account__sub" data-builder-member-type>建設パートナー</span>
          </span>
          <svg class="builder-account__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </button>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main">
      <section class="builder-panel" aria-label="テンプレ入力">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">基本情報</h2>
          <span class="builder-kpi" data-builder-template-edit-kpi>—</span>
        </div>

        <form class="builder-form" data-builder-template-form>
          <label class="builder-field">
            <span class="builder-field__label">テンプレ名</span>
            <input class="builder-input" type="text" name="name" placeholder="例: 店舗内装（標準）" data-builder-template-name />
          </label>

          <label class="builder-field">
            <span class="builder-field__label">投稿先（デフォルト）</span>
            <select class="builder-select" name="default_kind" data-builder-template-kind>
              <option value="tasful_managed">TASFUL案件管理</option>
              <option value="builder_board">Builder掲示板</option>
            </select>
          </label>

          <label class="builder-field">
            <span class="builder-field__label">公開範囲（デフォルト）</span>
            <select class="builder-select" name="default_visibility" data-builder-template-visibility>
              <option value="public">公開（全体）</option>
              <option value="private">非公開（自分だけ）</option>
              <option value="partner_only">パートナー限定</option>
              <option value="team_only">チーム限定</option>
            </select>
            <span class="builder-field__hint" data-builder-visibility-hint>—</span>
          </label>

          <label class="builder-field">
            <span class="builder-field__label">連絡ポリシー（デフォルト）</span>
            <select class="builder-select" name="default_contact_policy" data-builder-template-contact-policy>
              <option value="tasful_talk_only">TASFUL Talkのみ（推奨）</option>
              <option value="owner_allowed">オーナー判断で共有可</option>
              <option value="admin_only">管理者のみ共有可</option>
            </select>
            <span class="builder-field__hint" data-builder-contact-policy-hint>—</span>
          </label>

          <label class="builder-field">
            <span class="builder-field__label">工種タグ</span>
            <input class="builder-input" type="text" name="trade_tags" placeholder="例: 内装, 軽天, クロス" data-builder-template-trades />
            <span class="builder-field__hint">カンマ区切り（demo）</span>
          </label>

          <label class="builder-field">
            <span class="builder-field__label">エリア</span>
            <input class="builder-input" type="text" name="area_codes" placeholder="例: tokyo, kanagawa" data-builder-template-areas />
            <span class="builder-field__hint">カンマ区切り（demo）</span>
          </label>

          <label class="builder-field builder-field--full">
            <span class="builder-field__label">募集説明</span>
            <textarea class="builder-textarea" name="description" rows="6" placeholder="概要、条件、注意事項…" data-builder-template-desc></textarea>
          </label>

          <div class="builder-field builder-field--full">
            <div class="builder-callouts" data-builder-template-callouts></div>
          </div>

          <div class="builder-form__actions">
            <button type="submit" class="builder-btn builder-btn--primary" data-builder-template-save>保存（demo）</button>
            <a class="builder-btn builder-btn--ghost" href="templates.html">キャンセル</a>
          </div>
        </form>
      </section>

      <footer class="builder-footer" aria-label="フッター">
        <p>© 2024 TASFUL. All rights reserved.</p>
      </footer>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" }).catch(function () {});
      });
    }
  </script>
    <script src="../talk-runtime.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="builder-actor-identity.js"></script>
    <script src="builder-config.js"></script>
  <script src="builder-mvp-store-local.js"></script>
  <script src="builder-repositories-local.js"></script>
  <script src="builder-repositories-supabase.js"></script>
  <script src="builder-actor-resolver.js"></script>
  <script src="builder-session.js"></script>
  <script src="builder-data-provider.js"></script>
  <script src="builder-repository.js"></script>
    <script src="builder-partner-adapter.js"></script>
  <script src="builder-storage-adapter.js"></script>
  <script src="builder-pdf-adapter.js"></script>

  <script src="builder-event-hub.js"></script>
  <script src="builder-notification-adapter.js"></script>
  <script src="builder-ai-adapter.js"></script>
  <script src="builder-ai-tools.js"></script>
  <script src="builder-ai-tool-router.js"></script>
  <script src="builder-ai-core.js"></script>
  <script src="builder-b3-init.js"></script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
  <link rel="stylesheet" href="../tasful-site-assistant.css">
  <script src="../tasful-site-assistant-adapter.js" defer></script>
  <script src="../tasful-site-assistant.js" defer></script>
</body>
</html>
