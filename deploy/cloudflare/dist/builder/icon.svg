<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TASFUL Builder icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c" />
      <stop offset="1" stop-color="#ea580c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14" />
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#bg)" />

  <!-- Mark container -->
  <g filter="url(#shadow)">
    <rect x="108" y="108" width="296" height="296" rx="84" fill="#ffffff" />
    <rect x="108" y="108" width="296" height="296" rx="84" fill="none" stroke="#fed7aa" stroke-width="10" />
  </g>

  <!-- Building silhouette -->
  <g>
    <path d="M170 356V208l86-44 86 44v148H170Z" fill="#0f172a" opacity="0.06" />
    <path d="M176 356V214l80-40 80 40v142H176Z" fill="#f97316" opacity="0.12" />
    <path d="M184 356V220l72-36 72 36v136H184Z" fill="none" stroke="#c2410c" stroke-width="14" stroke-linejoin="round" />
    <!-- windows -->
    <g fill="#c2410c" opacity="0.65">
      <rect x="214" y="244" width="28" height="28" rx="6" />
      <rect x="270" y="244" width="28" height="28" rx="6" />
      <rect x="214" y="294" width="28" height="28" rx="6" />
      <rect x="270" y="294" width="28" height="28" rx="6" />
    </g>
  </g>

  <!-- Helmet -->
  <g>
    <path d="M186 236c0-42 34-76 76-76s76 34 76 76v10H186v-10Z" fill="url(#accent)" />
    <path d="M198 246h128c0 18-14 32-32 32h-64c-18 0-32-14-32-32Z" fill="#fff7ed" />
    <path d="M186 246h152" stroke="#9a3412" stroke-width="14" stroke-linecap="round" />
    <path d="M256 164v66" stroke="#fff7ed" stroke-width="12" stroke-linecap="round" opacity="0.95" />
  </g>

  <!-- Tool (wrench) -->
  <g transform="translate(0,0)">
    <path
      d="M338 306c18-18 24-44 14-66l-24 24-22-6-6-22 24-24c-22-10-48-4-66 14-16 16-22 38-18 59l-56 56c-8 8-8 20 0 28l6 6c8 8 20 8 28 0l56-56c21 4 43-2 59-18Z"
      fill="#f97316"
      opacity="0.18"
    />
    <path
      d="M340 304c18-18 24-44 14-66l-24 24-22-6-6-22 24-24c-22-10-48-4-66 14-16 16-22 38-18 59l-56 56c-8 8-8 20 0 28l6 6c8 8 20 8 28 0l56-56c21 4 43-2 59-18Z"
      fill="none"
      stroke="#c2410c"
      stroke-width="12"
      stroke-linejoin="round"
    />
  </g>

  <!-- Bottom baseline -->
  <path d="M160 376h192" stroke="#0f172a" stroke-width="12" stroke-linecap="round" opacity="0.12" />
</svg>
