<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c0f1d" />
  <title>通知送信 | Builder Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-admin-notifications">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder Admin ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="../builder-admin/admin-index.html" aria-label="Builder Adminダッシュボード">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" /><path d="m12 19-7-7 7-7" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder Admin</span>
              <span class="builder-brand__sub">通知送信</span>
            </span>
          </a>
          <a class="builder-page-back" href="../builder-admin/admin-index.html" aria-label="運営ダッシュボードへ">‹ 運営ダッシュボード</a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">通知送信</h1>
          <p class="builder-header__sub">利用者・パートナーへの運営通知（MVP）</p>
        </div>

        <a class="builder-account" href="../dashboard.html" aria-label="TASFUL会員ダッシュボードへ">
          <img class="builder-account__avatar" data-dash-avatar src="https://placehold.co/64x64/fff7ed/c2410c?text=AD" width="40" height="40" alt="" />
          <span class="builder-account__text">
            <span class="builder-account__name" data-dash-user-name>運営</span>
            <span class="builder-account__sub" data-builder-member-type>TASFUL運営</span>
          </span>
          <svg class="builder-account__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </a>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main builder-admin-notifications">
      <div class="builder-admin-notifications-layout">
        <section class="builder-panel" aria-label="通知送信フォーム">
          <div class="builder-panel__head">
            <h2 class="builder-section-title">新規送信</h2>
          </div>

          <form class="builder-admin-notification-form" data-builder-admin-notification-form>
            <label class="builder-field">
              <span class="builder-field__label">送信先</span>
              <select class="builder-select builder-admin-notification-input" name="to" data-builder-admin-notif-to required>
                <option value="all">全体</option>
                <option value="users">利用者</option>
                <option value="partners">パートナー</option>
              </select>
            </label>

            <label class="builder-field">
              <span class="builder-field__label">案件（任意）</span>
              <select class="builder-select builder-admin-notification-input" name="project_id" data-builder-admin-notif-project>
                <option value="">案件を選択しない</option>
              </select>
            </label>

            <label class="builder-field builder-field--full">
              <span class="builder-field__label">タイトル</span>
              <input class="builder-input builder-admin-notification-input" type="text" name="title" placeholder="例: メンテナンスのお知らせ" data-builder-admin-notif-title />
            </label>

            <label class="builder-field builder-field--full">
              <span class="builder-field__label">本文</span>
              <textarea class="builder-input builder-admin-notification-input" name="body" rows="5" placeholder="通知本文を入力…" data-builder-admin-notif-body required></textarea>
            </label>

            <label class="builder-field builder-field--full">
              <span class="builder-field__label">添付ファイル名（表示のみ）</span>
              <input class="builder-input builder-admin-notification-input" type="text" name="attachment" placeholder="例: お知らせ.pdf" data-builder-admin-notif-attachment />
            </label>

            <div class="builder-form__actions">
              <button type="submit" class="builder-btn builder-btn--primary">送信</button>
              <a class="builder-btn builder-btn--ghost" href="mvp-notifications.html">通知一覧を見る</a>
            </div>
          </form>
        </section>

        <section class="builder-panel" aria-label="送信履歴">
          <div class="builder-panel__head">
            <h2 class="builder-section-title">送信履歴</h2>
            <span class="builder-kpi" data-builder-admin-notification-count>—</span>
          </div>
          <div class="builder-admin-notification-history" data-builder-admin-notification-history></div>
        </section>
      </div>

      <footer class="builder-footer" aria-label="フッター">
        <p>© 2024 TASFUL inc. All rights reserved. Builder Admin</p>
      </footer>
    </main>
  </div>

    <script src="../talk-runtime.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="builder-actor-identity.js"></script>
    <script src="builder-config.js"></script>
  <script src="builder-mvp-store-local.js"></script>
  <script src="builder-repositories-local.js"></script>
  <script src="builder-repositories-supabase.js"></script>
  <script src="builder-actor-resolver.js"></script>
  <script src="builder-session.js"></script>
  <script src="builder-data-provider.js"></script>
  <script src="builder-repository.js"></script>
    <script src="builder-partner-adapter.js"></script>
  <script src="builder-storage-adapter.js"></script>
  <script src="builder-pdf-adapter.js"></script>

  <script src="builder-event-hub.js"></script>
  <script src="builder-notification-adapter.js"></script>
  <script src="builder-ai-adapter.js"></script>
  <script src="builder-ai-tools.js"></script>
  <script src="builder-ai-tool-router.js"></script>
  <script src="builder-ai-core.js"></script>
  <script src="builder-b3-init.js"></script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
</body>
</html>
