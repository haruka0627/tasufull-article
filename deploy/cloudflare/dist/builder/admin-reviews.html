<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c0f1d" />
  <title>審査管理 | Builder Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
</head>
<body class="builder-body" data-page="builder-admin-reviews">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder Admin ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="../builder-admin/admin-index.html" aria-label="Builder Adminダッシュボード">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" /><path d="m12 19-7-7 7-7" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder Admin</span>
              <span class="builder-brand__sub">審査管理</span>
            </span>
          </a>
          <a class="builder-page-back" href="../builder-admin/admin-index.html" aria-label="運営ダッシュボードへ">‹ 運営ダッシュボード</a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title">審査管理</h1>
          <p class="builder-header__sub">パートナー（協力会社）の審査状況を管理（運営専用）</p>
        </div>

        <a class="builder-account" href="../dashboard.html" aria-label="TASFUL会員ダッシュボードへ">
          <img class="builder-account__avatar" data-dash-avatar src="https://placehold.co/64x64/fff7ed/c2410c?text=AD" width="40" height="40" alt="" />
          <span class="builder-account__text">
            <span class="builder-account__name" data-dash-user-name>運営</span>
            <span class="builder-account__sub" data-builder-member-type>TASFUL運営</span>
          </span>
          <svg class="builder-account__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </a>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main builder-admin-reviews">
      <section class="builder-stat-grid builder-admin-review-stats" aria-label="審査サマリー">
        <article class="builder-stat-card">
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">未審査</span>
            <strong class="builder-stat-card__value" data-builder-admin-review-stat-unreviewed>—</strong>
          </div>
        </article>
        <article class="builder-stat-card">
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">審査中</span>
            <strong class="builder-stat-card__value" data-builder-admin-review-stat-reviewing>—</strong>
          </div>
        </article>
        <article class="builder-stat-card">
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">承認済み</span>
            <strong class="builder-stat-card__value" data-builder-admin-review-stat-approved>—</strong>
          </div>
        </article>
        <article class="builder-stat-card">
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">差し戻し</span>
            <strong class="builder-stat-card__value" data-builder-admin-review-stat-returned>—</strong>
          </div>
        </article>
        <article class="builder-stat-card">
          <div class="builder-stat-card__body">
            <span class="builder-stat-card__label">停止中</span>
            <strong class="builder-stat-card__value" data-builder-admin-review-stat-suspended>—</strong>
          </div>
        </article>
      </section>

      <section class="builder-panel builder-admin-filter-panel" aria-label="検索・絞り込み">
        <div class="builder-panel__head">
          <h2 class="builder-section-title">検索・絞り込み</h2>
          <span class="builder-kpi" data-builder-admin-review-count>—</span>
        </div>

        <form class="builder-search builder-admin-search-form" data-builder-admin-review-search-form>
          <label class="builder-field builder-field--full">
            <span class="builder-field__label">キーワード</span>
            <input class="builder-input" type="search" name="q" placeholder="会社名・担当者名…" data-builder-admin-review-search-q />
          </label>

          <label class="builder-field">
            <span class="builder-field__label">審査状態</span>
            <select class="builder-select" name="reviewStatus" data-builder-admin-review-search-status>
              <option value="">すべて</option>
              <option value="unreviewed">未審査</option>
              <option value="reviewing">審査中</option>
              <option value="approved">承認済み</option>
              <option value="returned">差し戻し</option>
              <option value="suspended">停止中</option>
            </select>
          </label>

          <label class="builder-field">
            <span class="builder-field__label">工種</span>
            <select class="builder-select" name="trade" data-builder-admin-review-search-trade>
              <option value="">すべて</option>
              <option value="足場">足場</option>
              <option value="内装">内装</option>
              <option value="電気">電気</option>
              <option value="設備">設備</option>
              <option value="塗装">塗装</option>
            </select>
          </label>

          <label class="builder-field">
            <span class="builder-field__label">エリア</span>
            <select class="builder-select" name="area" data-builder-admin-review-search-area>
              <option value="">すべて</option>
              <option value="東京">東京都</option>
              <option value="神奈川">神奈川</option>
              <option value="埼玉">埼玉</option>
              <option value="千葉">千葉</option>
            </select>
          </label>

          <div class="builder-form__actions">
            <button type="submit" class="builder-btn builder-btn--primary">検索</button>
            <button type="button" class="builder-btn builder-btn--ghost" data-builder-admin-review-search-reset>リセット</button>
          </div>
        </form>
      </section>

      <div class="builder-admin-reviews-layout">
        <section class="builder-panel" aria-label="審査対象一覧" data-builder-admin-review-list></section>
        <aside class="builder-panel builder-admin-review-detail-panel" data-builder-admin-review-detail-panel hidden aria-label="審査詳細"></aside>
      </div>

      <footer class="builder-footer" aria-label="フッター">
        <p>© 2024 TASFUL inc. All rights reserved. Builder Admin</p>
      </footer>
    </main>
  </div>

    <script src="../talk-runtime.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="builder-actor-identity.js"></script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
</body>
</html>
