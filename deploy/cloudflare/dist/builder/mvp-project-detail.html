<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0f1d" />
  <title>案件詳細 | Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="builder.css" />
  <link rel="stylesheet" href="../common-breadcrumb.css" />
  <link rel="stylesheet" href="../tasful-app-mobile.css" />
  <link rel="stylesheet" href="../tasful-app-mobile-detail.css" />
</head>
<body class="builder-body tasu-app-shell-detail" data-page="builder-mvp-project-detail">
  <div class="builder-app" data-builder-root>
    <header class="builder-header" aria-label="Builder ヘッダー">
      <div class="builder-shell builder-header__inner">
        <div class="builder-brandWrap">
          <a class="builder-brand" href="index.html" aria-label="Builderダッシュボードへ">
            <span class="builder-brand__mark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 21h18" />
                <path d="M7 21V7l8-4v18" />
                <path d="M17 21V11l-6-4" />
                <path d="M9 9v.01" />
                <path d="M9 12v.01" />
                <path d="M9 15v.01" />
                <path d="M9 18v.01" />
              </svg>
            </span>
            <span class="builder-brand__text">
              <span class="builder-brand__main">Builder</span>
              <span class="builder-brand__sub">案件詳細</span>
            </span>
          </a>
          <a class="builder-page-back" href="mvp-projects.html" data-builder-page-back aria-label="案件一覧へ">‹ 案件一覧</a>
        </div>

        <div class="builder-header__center">
          <h1 class="builder-header__title" data-builder-mvp-pd-title>案件詳細</h1>
          <p class="builder-header__sub" data-builder-mvp-pd-sub>—</p>
        </div>

        <div class="builder-role" data-builder-role></div>
      </div>
    </header>

    <nav data-breadcrumb aria-label="パンくず"></nav>

    <main class="builder-shell builder-main">
      <section class="builder-panel mvp-pd-hero" aria-label="案件サマリー">
        <div class="mvp-pd-hero__head">
          <div class="mvp-pd-hero__badges" data-builder-mvp-pd-badges></div>
          <p class="mvp-pd-hero__summary" data-builder-mvp-pd-hero-summary>—</p>
        </div>
        <dl class="mvp-pd-statGrid" data-builder-mvp-pd-stats></dl>
        <div class="mvp-pd-applyHero" data-builder-mvp-pd-apply-hero hidden>
          <button type="button" class="mvp-pd-btnPrimary mvp-pd-applyHero__btn" data-builder-mvp-pd-apply>
            応募する
          </button>
          <p class="mvp-pd-ctaHint mvp-pd-applyHero__hint" data-builder-mvp-pd-apply-status></p>
        </div>
      </section>

      <div class="mvp-dark-layout mvp-pd-layout" aria-label="案件詳細レイアウト">
        <div class="mvp-pd-main">
          <section class="builder-panel mvp-pd-panel--overview" aria-label="案件概要">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">案件概要</h2>
            </div>
            <div class="mvp-pd-body" data-builder-mvp-pd-overview></div>
          </section>

          <section class="builder-panel mvp-pd-panel--work" aria-label="作業内容">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">作業内容</h2>
            </div>
            <div class="mvp-pd-body" data-builder-mvp-pd-work></div>
          </section>

          <section class="builder-panel mvp-pd-panel--compact" aria-label="必要な職種">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">必要な職種</h2>
            </div>
            <div class="mvp-pd-chips" data-builder-mvp-pd-trades></div>
          </section>

          <section class="builder-panel" aria-label="希望条件">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">希望条件</h2>
            </div>
            <div class="mvp-pd-body" data-builder-mvp-pd-preferred></div>
          </section>

          <section class="builder-panel" aria-label="注意事項">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">注意事項</h2>
            </div>
            <div class="mvp-pd-body" data-builder-mvp-pd-notes></div>
          </section>

          <section class="builder-panel" aria-label="添付資料">
            <div class="builder-panel__head">
              <h2 class="builder-section-title">添付資料・図面</h2>
              <span class="builder-kpi" data-builder-mvp-pd-attach-kpi>—</span>
            </div>
            <ul class="mvp-pd-attachGrid" data-builder-mvp-pd-attachments></ul>
          </section>
        </div>

        <aside class="mvp-dark-side">
          <div class="mvp-dark-side__stack">
            <section class="builder-panel" aria-label="応募状況" data-builder-mvp-pd-apps-section>
              <div class="builder-panel__head">
                <h2 class="builder-section-title" data-builder-mvp-pd-apps-title>応募状況</h2>
                <span class="builder-kpi" data-builder-mvp-pd-app-kpi>—</span>
              </div>
              <div class="builder-callouts" data-builder-mvp-pd-app-callouts></div>
              <div class="builder-meta" data-builder-mvp-pd-app-meta></div>
              <ul class="mvp-pd-appList" data-builder-mvp-pd-app-list></ul>
            </section>

            <section class="builder-panel mvp-pd-cta" aria-label="アクション">
              <div class="builder-panel__head">
                <h2 class="builder-section-title">操作</h2>
              </div>
              <div class="mvp-pd-ctaStack">
                <button type="button" class="mvp-pd-btnPrimary" data-builder-mvp-pd-apply hidden>この案件に応募する</button>
                <button type="button" class="builder-btn builder-btn--ghost" data-builder-mvp-pd-decline-applicant hidden>見送る</button>
                <button type="button" class="mvp-pd-btnPrimary" data-builder-mvp-pd-start-chat hidden>やりとりを開始する</button>
                <a class="mvp-pd-btnPrimary" href="#" data-builder-mvp-pd-thread>スレッドを見る</a>
                <a class="builder-btn builder-btn--secondary" href="#" data-builder-mvp-pd-re-request>再依頼する</a>
                <a class="builder-btn builder-btn--ghost" href="#" data-builder-mvp-pd-edit>案件編集</a>
                <button type="button" class="builder-btn builder-btn--secondary builder-template-save-button" data-builder-mvp-pd-save-template>テンプレとして保存</button>
              </div>
              <p class="mvp-pd-ctaHint" data-builder-mvp-pd-thread-hint hidden>スレッド未作成のため、Talkへは遷移できません。</p>
            </section>
          </div>
        </aside>
      </div>

      <footer class="builder-footer"><p>© 2024 TASFUL. All rights reserved.</p></footer>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" }).catch(function () {});
      });
    }
  </script>
  <script src="../talk-notifications-store.js" defer></script>
  <script src="../talk-platform-notify.js" defer></script>
  <script src="../builder-bench-embed.js" defer></script>
    <script src="../talk-runtime.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="builder-actor-identity.js"></script>
    <script src="builder-config.js"></script>
  <script src="builder-mvp-store-local.js"></script>
  <script src="builder-repositories-local.js"></script>
  <script src="builder-repositories-supabase.js"></script>
  <script src="builder-actor-resolver.js"></script>
  <script src="builder-session.js"></script>
  <script src="builder-data-provider.js"></script>
  <script src="builder-repository.js"></script>
    <script src="builder-partner-adapter.js"></script>
  <script src="builder-storage-adapter.js"></script>
  <script src="builder-pdf-adapter.js"></script>

  <script src="builder-event-hub.js"></script>
  <script src="builder-notification-adapter.js"></script>
  <script src="builder-ai-adapter.js"></script>
  <script src="builder-ai-tools.js"></script>
  <script src="builder-ai-tool-router.js"></script>
  <script src="builder-ai-core.js"></script>
  <script src="builder-b3-init.js"></script>
  <script src="builder-general-flow.js"></script>
  <script src="../breadcrumb-config.js"></script>
  <script src="../common-breadcrumb.js"></script>
  <script src="builder.js" defer></script>
  <script src="../tasful-app-mobile.js" defer></script>
</body>
</html>
