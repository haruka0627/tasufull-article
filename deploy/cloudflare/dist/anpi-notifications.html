<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>安否通知センター | TASFUL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="anpi-notifications.css">
  <link rel="stylesheet" href="tasful-app-mobile.css">
  <link rel="stylesheet" href="tasful-app-mobile-detail.css">

  <link rel="stylesheet" href="tasful-mobile-detail-template.css">
</head>
<body class="dash-body anpi-notifications-page" data-page="anpi-notifications">
  <div class="dash-app">
    <div class="dash-sidebar__overlay" data-dash-overlay aria-hidden="true"></div>
    <aside class="dash-sidebar" id="dashSidebar" aria-label="会員メニュー">
      <div class="dash-sidebar__brand">
        <a href="index-top.html" class="tasful-ai-logo dash-sidebar__logo" aria-label="TASFUL">
          <img src="images/tasful-ai-globe.png?v=4" alt="" class="tasful-ai-logo-icon">
          <div class="tasful-ai-logo-text"><span class="main">TASFUL</span></div>
        </a>
      </div>
      <nav class="dash-sidebar__nav" id="dashSidebarNav" aria-label="サイドナビ">
        <div class="dash-nav-group">
          <p class="dash-nav-group__label">安否</p>
          <a class="dash-nav-link" href="anpi-dashboard.html">安否ダッシュボード</a>
          <a class="dash-nav-link" href="anpi-register.html">安否サービス登録</a>
          <a class="dash-nav-link is-active" href="anpi-notifications.html">安否通知センター</a>
          <a class="dash-nav-link" href="dashboard.html">ダッシュボード</a>
          <a class="dash-nav-link" href="ai-workspace.html">AI相談</a>
        </div>
      </nav>
    </aside>

    <div class="dash-main">
      <header class="dash-header dash-header--account">
        <div class="dash-shell dash-header__inner">
          <div class="dash-header__left">
            <button type="button" class="dash-menu-btn" data-dash-menu aria-label="メニューを開く">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <a href="index-top.html" class="tasful-ai-logo dash-header__logo" aria-label="TASFUL">
              <img src="images/tasful-ai-globe.png?v=4" alt="" class="tasful-ai-logo-icon">
              <div class="tasful-ai-logo-text"><span class="main">TASFUL</span></div>
            </a>
          </div>
          <div class="dash-header__actions">
            <a href="talk-home.html?tab=chat" class="dash-header-link" aria-label="メッセージ">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="dash-header-link__label">メッセージ</span>
              <span class="dash-header-link__badge" data-dash-msg-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="anpi-notifications.html" class="dash-header-link" aria-label="安否通知">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="dash-header-link__label">通知</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="profile-settings.html" class="dash-profile" aria-label="プロフィール">
              <img class="dash-profile__avatar" data-dash-avatar src="https://placehold.co/64x64/f3ead4/967622?text=ME" width="40" height="40" alt="">
              <span class="dash-profile__text">
                <span class="dash-profile__name" data-dash-user-name>会員</span>
                <span class="dash-profile__sub">個人・事業者</span>
              </span>
              <svg class="dash-profile__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </a>
          </div>
        </div>
      </header>

      <main class="dash-content dash-shell anpi-notifications-main" data-anpi-notifications-root>
        <section class="dash-member-page-head">
          <h1 class="dash-member-page-head__title">安否通知センター</h1>
          <p class="dash-member-page-head__sub">安否確認・災害情報・訓練通知を確認できます。利用者のAI相談・電話同意・緊急通知の一覧です。</p>
        </section>

        <div class="anpi-notifications-filter" data-anpi-filter-note hidden></div>

        <section class="anpi-notifications-summary" aria-label="通知サマリー" data-anpi-summary>
          <article class="anpi-summary-card notification-summary-card">
            <span class="anpi-summary-card__label">未読通知</span>
            <strong class="anpi-summary-card__value" data-anpi-summary-unread>0件</strong>
          </article>
          <article class="anpi-summary-card notification-summary-card">
            <span class="anpi-summary-card__label">総通知</span>
            <strong class="anpi-summary-card__value" data-anpi-summary-total>0件</strong>
          </article>
          <article class="anpi-summary-card notification-summary-card anpi-summary-card--urgent">
            <span class="anpi-summary-card__label">緊急通知</span>
            <strong class="anpi-summary-card__value" data-anpi-summary-urgent>0件</strong>
          </article>
        </section>

        <section class="anpi-urgent-zone" aria-labelledby="anpiUrgentTitle" data-anpi-urgent-zone hidden>
          <h2 id="anpiUrgentTitle" class="anpi-urgent-zone__title">緊急通知</h2>
          <div class="anpi-urgent-zone__list" data-anpi-urgent-list></div>
        </section>

        <section class="anpi-notifications-list-section all-notifications" aria-labelledby="anpiListTitle">
          <div class="anpi-notifications-list-head">
            <h2 id="anpiListTitle" class="anpi-notifications-list-title section-title-all-notifications">すべての通知</h2>
            <button type="button" class="anpi-notifications-refresh" data-anpi-refresh>更新</button>
          </div>
          <div class="anpi-notifications-empty empty-placeholder" data-anpi-empty hidden>
            <div class="anpi-notifications-empty__icon" aria-hidden="true">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
            <p class="anpi-notifications-empty__title">🔔 通知はありません</p>
            <p class="anpi-notifications-empty__types">
              <span>安否確認</span>
              <span>災害情報</span>
              <span>訓練通知</span>
            </p>
            <p class="anpi-notifications-empty__hint">が届くとここに表示されます</p>
          </div>
          <ul class="anpi-notifications-list" data-anpi-notification-list></ul>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat-supabase-config.js" defer></script>
  <script src="supabase-public-key.js" defer></script>
  <script src="tasu-supabase-client.js" defer></script>
  <script src="anpi-identity.js" defer></script>
  <script src="auth-current-user.js" defer></script>
  <script src="platform-actor-resolver.js" defer></script>
  <script src="anpi-rls.js" defer></script>
  <script src="anpi-user-context-supabase.js" defer></script>
  <script src="anpi-user-context.js" defer></script>
  <script src="anpi-notification-log-supabase.js" defer></script>
  <script src="talk-category-normalize.js"></script>
  <script src="talk-notifications-store.js" defer></script>
  <script src="talk-platform-notify.js" defer></script>
  <script src="anpi-notification-log.js" defer></script>
  <script src="anpi-notifications.js" defer></script>
  <script src="tasful-app-mobile.js" defer></script>
  <script src="tasful-mobile-detail-template.js" defer></script>
  <link rel="stylesheet" href="tasful-site-assistant.css">
  <script src="tasful-site-assistant-adapter.js" defer></script>
  <script src="tasful-site-assistant.js" defer></script>
</body>
</html>
