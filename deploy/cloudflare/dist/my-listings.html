<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>掲載中のサービス | TASFUL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="my-listings.css">

  <link rel="stylesheet" href="tasful-app-mobile.css">

  <link rel="stylesheet" href="tasful-app-mobile-detail.css">

  <link rel="stylesheet" href="tasful-mobile-detail-template.css">
</head>
<body class="dash-body" data-page="my-listings">
  <div class="dash-app">
    <div class="dash-sidebar__overlay" data-dash-overlay aria-hidden="true"></div>

    <aside class="dash-sidebar" id="dashSidebar" aria-label="会員メニュー">
      <div class="dash-sidebar__brand">
        <a href="index-top.html" class="tasful-ai-logo dash-sidebar__logo" aria-label="TASFUL">
          <img
            src="images/tasful-ai-globe.png?v=4"
            alt=""
            class="tasful-ai-logo-icon"
          >
          <div class="tasful-ai-logo-text">
            <span class="main">TASFUL</span>
          </div>
        </a>
      </div>
      <nav class="dash-sidebar__nav" id="dashSidebarNav" aria-label="サイドナビ"></nav>
    </aside>

    <div class="dash-main">
      <header class="dash-header">
        <div class="dash-shell dash-header__inner">
          <div class="dash-header__left">
            <button type="button" class="dash-menu-btn" data-dash-menu aria-label="メニューを開く">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
          </div>
          <div class="dash-header__actions">
            <a href="talk-home.html?tab=chat" class="dash-header-link" aria-label="メッセージ">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="dash-header-link__label">メッセージ</span>
              <span class="dash-header-link__badge" data-dash-msg-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="dashboard.html#dash-notices" class="dash-header-link" aria-label="通知">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="dash-header-link__label">通知</span>
              <span class="dash-header-link__badge" data-dash-notice-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="profile-settings.html" class="dash-profile" aria-label="プロフィール">
              <img class="dash-profile__avatar" data-dash-avatar src="https://placehold.co/64x64/f3ead4/967622?text=ME" width="40" height="40" alt="">
              <span class="dash-profile__text">
                <span class="dash-profile__name" data-dash-user-name>会員</span>
                <span class="dash-profile__sub">個人・事業者</span>
              </span>
              <svg class="dash-profile__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </a>
          </div>
        </div>
      </header>

      <!-- 正式レイアウト: ページタイトルは本文 my-listings-page-head のみ（上部 dash-header にタイトルなし） -->
      <main class="dash-content dash-shell my-listings-layout">
        <header class="my-listings-page-head">
          <div class="my-listings-page-head__intro">
            <h1 class="my-listings-page-head__title">掲載中のサービス</h1>
            <p class="my-listings-page-head__sub">自分の掲載を管理できます</p>
          </div>
          <a class="dash-btn dash-btn--primary my-listings-page-head__create" href="post.html?scope=business">新規掲載を作成</a>
        </header>

        <section class="dash-card my-listings-card" aria-labelledby="myListingsTitle">
          <div class="dash-card__head my-listings-card__head">
            <div>
              <h2 class="dash-card__title" id="myListingsTitle">自分の掲載一覧</h2>
              <p class="my-listings-card__lead">ログイン中のアカウントが所有する掲載のみ表示します。</p>
            </div>
          </div>
          <div class="dash-card__body dash-card__body--padded">
            <div class="my-listings-login" data-my-listings-login hidden>
              <p class="my-listings-login__text">掲載一覧を表示するにはログインが必要です。</p>
              <div class="my-listings-login__actions">
                <a class="dash-btn dash-btn--primary" href="signup.html">ログイン / 会員登録</a>
                <a class="dash-btn dash-btn--secondary" href="dashboard.html">会員ページへ</a>
              </div>
            </div>
            <p class="my-listings-status" data-my-listings-status role="status">読み込み中…</p>
            <p class="my-listings-toast" data-my-listings-toast hidden role="status"></p>
            <div class="my-listings-table-wrap my-listings-listings" data-my-listings-table-wrap hidden>
              <table class="my-listings-table">
                <thead>
                  <tr>
                    <th scope="col">タイトル</th>
                    <th scope="col">掲載種別</th>
                    <th scope="col">カテゴリ</th>
                    <th scope="col">公開状態</th>
                    <th scope="col">作成日</th>
                    <th scope="col">更新日</th>
                    <th scope="col">操作</th>
                  </tr>
                </thead>
                <tbody data-my-listings-tbody></tbody>
              </table>
            </div>
            <div class="my-listings-samples" data-my-listings-samples hidden>
              <div class="my-listings-empty-state">
                <div class="my-listings-empty-state__icon" aria-hidden="true">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="3"/>
                    <path d="M8 12h8M12 8v8"/>
                  </svg>
                </div>
                <p class="my-listings-empty-state__title">まだ掲載中のサービスはありません</p>
                <p class="my-listings-empty-state__text">新規掲載を作成して最初の掲載を始めましょう</p>
                <a class="dash-btn dash-btn--primary my-listings-empty-state__cta" href="post.html?scope=business">＋ 新規掲載を作成</a>
              </div>
              <div class="my-listings-listing-grid my-listings-listing-grid--samples" data-my-listings-samples-grid role="list" aria-label="デモ掲載サンプル"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="dashboard-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat-supabase-config.js"></script>
  <script src="supabase-public-key.js"></script>
  <script src="tasu-supabase-client.js"></script>
  <script src="chat-user-identity.js"></script>
  <script src="chat-supabase.js"></script>
  <script src="chat-service.js"></script>
  <script src="service-deals-db.js"></script>
  <script src="favorites-db.js"></script>
  <script src="business-service-data.js"></script>
  <script src="business-board-demo.js"></script>
  <script src="listings-db.js"></script>
  <script src="business-listings-db.js"></script>
  <script src="dashboard-data.js"></script>
  <script src="member-profile.js"></script>
  <script src="member-auth.js"></script>
  <script src="demo-deals-data.js"></script>
  <script src="dashboard.js"></script>
  <script src="my-listings.js"></script>
  <script src="tasful-app-mobile.js" defer></script>
  <script src="tasful-mobile-detail-template.js" defer></script>
</body>
</html>
