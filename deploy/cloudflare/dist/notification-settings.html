<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知設定 | TASFUL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dash-body" data-page="notification-settings">
  <div class="dash-app">
    <div class="dash-sidebar__overlay" data-dash-overlay aria-hidden="true"></div>

    <aside class="dash-sidebar" id="dashSidebar" aria-label="会員メニュー">
      <div class="dash-sidebar__brand">
        <a href="index-top.html" class="tasful-ai-logo dash-sidebar__logo" aria-label="TASFUL">
          <img src="images/tasful-ai-globe.png?v=4" alt="" class="tasful-ai-logo-icon">
          <div class="tasful-ai-logo-text"><span class="main">TASFUL</span></div>
        </a>
      </div>
      <nav class="dash-sidebar__nav" id="dashSidebarNav" aria-label="サイドナビ"></nav>
    </aside>

    <div class="dash-main">
      <header class="dash-header dash-header--account">
        <div class="dash-shell dash-header__inner">
          <div class="dash-header__left">
            <button type="button" class="dash-menu-btn" data-dash-menu aria-label="メニューを開く">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <a href="index-top.html" class="tasful-ai-logo dash-header__logo" aria-label="TASFUL">
              <img src="images/tasful-ai-globe.png?v=4" alt="" class="tasful-ai-logo-icon">
              <div class="tasful-ai-logo-text"><span class="main">TASFUL</span></div>
            </a>
          </div>
          <div class="dash-header__actions">
            <a href="talk-home.html?tab=chat" class="dash-header-link" aria-label="メッセージ">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="dash-header-link__label">メッセージ</span>
              <span class="dash-header-link__badge" data-dash-msg-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="dashboard.html#dash-notices" class="dash-header-link" aria-label="通知">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="dash-header-link__label">通知</span>
              <span class="dash-header-link__badge" data-dash-notice-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="profile-settings.html" class="dash-profile" aria-label="プロフィール">
              <img class="dash-profile__avatar" data-dash-avatar src="https://placehold.co/64x64/f3ead4/967622?text=ME" width="40" height="40" alt="">
              <span class="dash-profile__text">
                <span class="dash-profile__name" data-dash-user-name>会員</span>
                <span class="dash-profile__sub">個人・事業者</span>
              </span>
              <svg class="dash-profile__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </a>
          </div>
        </div>
      </header>

      <main class="dash-content dash-shell">
        <section class="dash-member-page-head">
          <h1 class="dash-member-page-head__title">通知設定</h1>
          <p class="dash-member-page-head__sub">メッセージ・見積もり・取引に関する通知を管理できます。</p>
        </section>

        <form class="dash-notify-form" data-notify-form novalidate>
          <section class="dash-card dash-settings" aria-labelledby="notifyChannelTitle">
            <div class="dash-card__head">
              <h2 class="dash-card__title" id="notifyChannelTitle">通知チャンネル</h2>
            </div>
            <div class="dash-card__body dash-card__body--padded dash-toggle-list">
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">メール通知</p>
                  <p class="dash-toggle-row__hint">重要なお知らせをメールで受け取ります</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="email" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">メール通知</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">サイト内通知</p>
                  <p class="dash-toggle-row__hint">会員ページの通知エリアに表示します</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="site" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">サイト内通知</span>
                </label>
              </div>
              <div class="dash-toggle-row dash-toggle-row--soon">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">LINE通知 <span class="dash-badge-soon">予定</span></p>
                  <p class="dash-toggle-row__hint">LINE公式アカウント連携（準備中）</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="line">
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">LINE通知</span>
                </label>
              </div>
              <div class="dash-toggle-row dash-toggle-row--soon">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">SMS通知 <span class="dash-badge-soon">予定</span></p>
                  <p class="dash-toggle-row__hint">SMSによる重要通知（準備中）</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="sms">
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">SMS通知</span>
                </label>
              </div>
            </div>
          </section>

          <section class="dash-card dash-settings" aria-labelledby="notifyContentTitle">
            <div class="dash-card__head">
              <h2 class="dash-card__title" id="notifyContentTitle">通知内容</h2>
            </div>
            <div class="dash-card__body dash-card__body--padded dash-toggle-list">
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">新しいメッセージ</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="newMessage" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">新しいメッセージ</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">見積もり依頼</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="estimateRequest" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">見積もり依頼</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">相談チャット</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="consultChat" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">相談チャット</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">取引開始</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="dealStarted" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">取引開始</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">取引完了</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="dealCompleted" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">取引完了</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">手数料支払い</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="feePayment" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">手数料支払い</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">お気に入り追加</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="favoriteAdded">
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">お気に入り追加</span>
                </label>
              </div>
              <div class="dash-toggle-row">
                <div class="dash-toggle-row__text">
                  <p class="dash-toggle-row__label">掲載審査・公開通知</p>
                </div>
                <label class="dash-toggle">
                  <input type="checkbox" data-notify-toggle="listingStatus" checked>
                  <span class="dash-toggle__track" aria-hidden="true"></span>
                  <span class="visually-hidden">掲載審査・公開通知</span>
                </label>
              </div>
            </div>
          </section>

          <section class="dash-card dash-settings" aria-labelledby="notifyFrequencyTitle">
            <div class="dash-card__head">
              <h2 class="dash-card__title" id="notifyFrequencyTitle">通知頻度</h2>
            </div>
            <div class="dash-card__body dash-card__body--padded">
              <div class="dash-field">
                <label class="dash-field__label" for="notifyFrequency">通知のタイミング</label>
                <select class="dash-field__input dash-field__select" id="notifyFrequency" data-notify-frequency>
                  <option value="instant">すぐ通知</option>
                  <option value="daily">1日1回まとめて通知</option>
                  <option value="important">重要な通知のみ</option>
                </select>
              </div>
            </div>
          </section>

          <div class="dash-settings__actions dash-settings__actions--form">
            <button type="submit" class="dash-btn dash-btn--primary dash-btn--block-sm">保存する</button>
          </div>
        </form>

        <p class="dash-settings__toast" data-notify-toast hidden role="status"></p>
      </main>
    </div>
  </div>

  <script src="dashboard-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat-supabase-config.js"></script>
  <script src="supabase-public-key.js"></script>
  <script src="tasu-supabase-client.js"></script>
  <script src="chat-user-identity.js"></script>
  <script src="chat-supabase.js"></script>
  <script src="chat-service.js"></script>
  <script src="service-deals-db.js"></script>
  <script src="favorites-db.js"></script>
  <script src="business-service-data.js"></script>
  <script src="business-board-demo.js"></script>
  <script src="dashboard-data.js"></script>
  <script src="member-profile.js"></script>
  <script src="member-auth.js"></script>
  <script src="demo-deals-data.js"></script>
  <script src="dashboard.js"></script>
  <script src="notification-settings.js"></script>
</body>
</html>
