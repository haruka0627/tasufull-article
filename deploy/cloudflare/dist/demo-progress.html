<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>進行中の取引 | TASFUL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="demo-deals.css">

  <link rel="stylesheet" href="tasful-app-mobile.css">

  <link rel="stylesheet" href="tasful-app-mobile-detail.css">

  <link rel="stylesheet" href="tasful-mobile-detail-template.css">
</head>
<body class="dash-body" data-page="demo-progress">
  <div class="dash-app">
    <div class="dash-sidebar__overlay" data-dash-overlay aria-hidden="true"></div>
    <aside class="dash-sidebar" id="dashSidebar" aria-label="会員メニュー">
      <div class="dash-sidebar__brand">
        <a href="index-top.html" class="tasful-ai-logo dash-sidebar__logo" aria-label="TASFUL">
          <img src="images/tasful-ai-globe.png?v=4" alt="" class="tasful-ai-logo-icon">
          <div class="tasful-ai-logo-text"><span class="main">TASFUL</span></div>
        </a>
      </div>
      <nav class="dash-sidebar__nav" id="dashSidebarNav" aria-label="サイドナビ"></nav>
    </aside>
    <div class="dash-main">
      <header class="dash-header">
        <div class="dash-shell dash-header__inner">
          <div class="dash-header__left">
            <button type="button" class="dash-menu-btn" data-dash-menu aria-label="メニューを開く">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
          </div>
          <div class="dash-header__actions">
            <a href="talk-home.html?tab=chat" class="dash-header-link" aria-label="メッセージ">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="dash-header-link__label">メッセージ</span>
              <span class="dash-header-link__badge" data-dash-msg-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="dashboard.html#dash-notices" class="dash-header-link" aria-label="通知">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="dash-header-link__label">通知</span>
              <span class="dash-header-link__badge" data-dash-notice-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="profile-settings.html" class="dash-profile" aria-label="プロフィール">
              <img class="dash-profile__avatar" data-dash-avatar src="https://placehold.co/64x64/f3ead4/967622?text=ME" width="40" height="40" alt="">
              <span class="dash-profile__text">
                <span class="dash-profile__name" data-dash-user-name>会員</span>
                <span class="dash-profile__sub">個人・事業者</span>
              </span>
              <svg class="dash-profile__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </a>
          </div>
        </div>
      </header>
      <main class="dash-content dash-shell demo-deals-layout">
        <header class="demo-deals-page-head">
          <h1 class="demo-deals-page-head__title">進行中の取引</h1>
          <p class="demo-deals-page-head__sub">相談・見積・作業中の取引を確認できます。（デモ表示）</p>
        </header>
        <section class="demo-deals-panel" id="demo-deals-panel" aria-label="進行中の取引一覧">
          <div class="demo-deals-panel__head">
            <p class="demo-deals-panel__count"><span data-demo-deals-count>0</span>件の取引</p>
          </div>
          <ul class="demo-deals-list" data-demo-deals-list></ul>
        </section>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat-supabase-config.js"></script>
  <script src="supabase-public-key.js"></script>
  <script src="tasu-supabase-client.js"></script>
  <script src="chat-user-identity.js"></script>
  <script src="chat-supabase.js"></script>
  <script src="chat-service.js"></script>
  <script src="service-deals-db.js"></script>
  <script src="favorites-db.js"></script>
  <script src="business-service-data.js"></script>
  <script src="dashboard-data.js"></script>
  <script src="member-profile.js"></script>
  <script src="member-auth.js"></script>
  <script src="demo-deals-data.js"></script>
  <script src="demo-deals.js"></script>
  <script src="dashboard.js"></script>
  <script src="tasful-app-mobile.js" defer></script>
  <script src="tasful-mobile-detail-template.js" defer></script>
  <link rel="stylesheet" href="tasful-site-assistant.css">
  <script src="tasful-site-assistant-adapter.js" defer></script>
  <script src="tasful-site-assistant.js" defer></script>
</body>
</html>
