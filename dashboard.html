    <div class="dash-main">
      <header class="dash-header dash-header--member">
        <div class="dash-shell dash-header__inner">
          <div class="dash-header__left">
            <button type="button" class="dash-menu-btn" data-dash-menu aria-label="メニューを開く">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div class="dash-header__intro">
              <h1 class="dash-header__title">会員ダッシュボード</h1>
              <p class="dash-header__sub">取引・掲載・売上を管理</p>
            </div>
          </div>
          <div class="dash-header__actions">
            <a href="talk-home.html?tab=chat" class="dash-header-link" aria-label="メッセージ">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="dash-header-link__label">メッセージ</span>
              <span class="dash-header-link__badge" data-dash-msg-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="talk-home.html?tab=notify" class="dash-header-link" aria-label="通知">
              <svg class="dash-header-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="dash-header-link__label">通知</span>
              <span class="dash-header-link__badge" data-dash-notice-badge hidden>0</span>
            </a>
            <span class="dash-header__sep" aria-hidden="true"></span>
            <a href="profile-settings.html" class="dash-profile" aria-label="プロフィール">
              <img class="dash-profile__avatar" data-dash-avatar src="https://placehold.co/64x64/f3ead4/967622?text=ME" width="40" height="40" alt="">
              <span class="dash-profile__text">
                <span class="dash-profile__name" data-dash-user-name>会員</span>
                <span class="dash-profile__sub">個人・事業者</span>
              </span>
              <svg class="dash-profile__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </a>
          </div>
        </div>
      </header>

      <main class="dash-content dash-shell" id="dashContent">
        <div class="dash-connect-banner" data-connect-member-banner hidden role="status"></div>

        <div class="tasu-mobile-home tasu-mobile-home--hidden" data-tasu-mobile-home aria-label="TASFUL ホーム（スマホ）"></div>

        <nav class="dash-sp-nav" data-dash-sidebar-nav aria-label="主要メニュー（スマホ）">

        <p class="dash-welcome" data-dash-welcome>読み込み中…</p>

        <div class="dash-grid">

            <section class="dash-card" id="dash-ongoing" aria-labelledby="dashOngoingTitle">
              <div class="dash-card__head">
                <h2 class="dash-card__title" id="dashOngoingTitle">進行中の取引</h2>
                <a class="dash-card__link" href="#dash-ongoing">一覧を見る →</a>
              </div>

            <p class="dash-disclaimer">
              TASFULは取引代金を預かりません。支払い・返金・受け渡しは掛載者と依頼者の間で行ってください。成約後のTASFUL手数料は掛載者様よりお支払いいただきます。
            </p>
          </div>

            <section class="dash-card" id="dash-notices" aria-labelledby="dashNoticesTitle">

                <h2 class="dash-card__title" id="dashNoticesTitle">お知らせ・最新情報</h2>
              </div>

              </div>
              <div class="dash-card__body dash-card__body--padded" data-dash-fee-panel></div>
            </section>

        <div class="tasu-friend-add-modal" data-tasu-friend-add-modal hidden aria-hidden="true">
          <div class="tasu-friend-add-modal__backdrop" data-tasu-friend-add-close tabindex="-1" aria-hidden="true"></div>
          <div class="tasu-friend-add-modal__panel" role="dialog" aria-modal="true" aria-labelledby="tasuFriendAddTitle">
            <header class="tasu-friend-add-modal__head">
              <h2 id="tasuFriendAddTitle" class="tasu-friend-add-modal__title">友達追加</h2>
              <button type="button" class="tasu-friend-add-modal__close" data-tasu-friend-add-close aria-label="閉じる">✕</button>
            </header>
            <div class="tasu-friend-add-modal__body">
              <div class="tasu-friend-add-modal__tabs" role="tablist" aria-label="追加方法">
                <button type="button" class="tasu-friend-add-modal__tab is-active" data-future-feature="friend_invite" disabled>招待</button>
                <button type="button" class="tasu-friend-add-modal__tab" data-future-feature="friend_qr" disabled>QRコード</button>
                <button type="button" class="tasu-friend-add-modal__tab" data-future-feature="friend_search" disabled>検索</button>
              </div>
              <ul class="tasu-friend-add-modal__list">
                <li><button type="button" class="tasu-friend-add-modal__row" disabled data-future-feature="friend_auto_add">友達自動追加</button></li>
                <li><button type="button" class="tasu-friend-add-modal__row" disabled data-future-feature="friend_group_create">グループ作成</button></li>
                <li><button type="button" class="tasu-friend-add-modal__row" disabled data-future-feature="friend_profile_share">自分のプロフィール共有</button></li>
              </ul>
              <p class="tasu-friend-add-modal__section-title">おすすめ</p>
              <ul class="tasu-friend-add-modal__people" data-tasu-friend-suggestions>
                <li><button type="button" class="tasu-friend-add-modal__person" disabled data-future-feature="friend_recommended"><span class="tasu-friend-add-modal__person-avatar" aria-hidden="true">👤</span><span class="tasu-friend-add-modal__person-name">おすすめユーザー（準備中）</span></button></li>
                <li><button type="button" class="tasu-friend-add-modal__person" disabled data-future-feature="friend_recent"><span class="tasu-friend-add-modal__person-avatar" aria-hidden="true">💬</span><span class="tasu-friend-add-modal__person-name">最近やり取りした人（準備中）</span></button></li>
                <li><button type="button" class="tasu-friend-add-modal__person" disabled data-future-feature="friend_partner"><span class="tasu-friend-add-modal__person-avatar" aria-hidden="true">🤝</span><span class="tasu-friend-add-modal__person-name">パートナー候補（準備中）</span></button></li>
              </ul>
            </div>
            <footer class="tasu-friend-add-modal__foot">
              <button type="button" class="tasu-friend-add-modal__cancel" data-tasu-friend-add-close>閉じる</button>
            </footer>
          </div>
        </div>
