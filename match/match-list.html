<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF8FC" />
  <title>マッチ一覧 | TASFUL MATCH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="match.css" />
</head>
<body class="match-body" data-page="match-list" data-match-requires-login="1">
<div class="match-app match-app--phone">
    <header class="match-header" aria-label="ヘッダー">
      <h1 class="match-header__title">マッチ一覧</h1>
      <button type="button" class="match-icon-btn" aria-label="フィルタ">☰</button>
    </header>

    <main class="match-main">
      <p class="match-list-banner">マッチした相手と、TASFUL TALK でメッセージを送りましょう 💬</p>

      <div data-match-pair-list></div>

      <h2 class="match-list-section__title">新しいマッチ</h2>

      <article class="match-new-match-card" data-match-new-pair></article>

      <div class="match-ai-cta-stack" data-match-p15-section>
        <a class="match-ai-cta" data-match-ai-cta data-ai-mode="match-message-coach" data-ai-q-template="マッチ相手へのメッセージの書き方を相談したいです。" href="#">TASFUL AI でメッセージ相談</a>
        <a class="match-ai-cta match-ai-cta--mint" data-match-ai-cta data-ai-mode="match-date-coach" data-ai-q-template="初デートのプランやマナーについて相談したいです。" href="#">TASFUL AI でデート相談</a>
      </div>
    </main>

    <nav class="match-tabbar" aria-label="メインナビ">
      <div class="match-tabbar__inner">
        <a class="match-tabbar__link" href="match-swipe.html">
          <span class="match-tabbar__icon" aria-hidden="true">💘</span>
          <span>スワイプ</span>
        </a>
        <a class="match-tabbar__link is-active" href="match-list.html">
          <span class="match-tabbar__icon" aria-hidden="true">💞</span>
          <span>マッチ</span>
          <span class="match-tabbar__badge">2</span>
        </a>
        <a class="match-tabbar__link" href="match-safety.html">
          <span class="match-tabbar__icon" aria-hidden="true">🛡️</span>
          <span>安心</span>
        </a>
        <a class="match-tabbar__link" href="match-mypage.html">
          <span class="match-tabbar__icon" aria-hidden="true">👤</span>
          <span>マイページ</span>
        </a>
      </div>
    </nav>
  </div>
  <div class="match-toast" data-match-toast role="status" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../chat-supabase-config.js"></script>
  <script src="../auth-current-user.js"></script>
  <script src="../tasu-supabase-client.js"></script>

  <script src="match-auth.js"></script>
  <script src="match-data-stub.js"></script>
  <script src="match-data-render.js"></script>
  <script src="match-api.js"></script>
  <script src="match-bootstrap.js"></script>
  <script src="match-beta-gate.js"></script>
  <script src="match-login-gate.js"></script>
  <script src="../ai-workspace-links.js"></script>
  <script src="match-ai-cta.js"></script>
  <script src="match-p15-render.js"></script>
  <script src="match-mock.js"></script>
  <script src="match-wiring.js"></script>
  <script src="match-core-wiring.js"></script>
  <script src="match-unmatch-wiring.js"></script>
  <script src="match-p15-wiring.js"></script>
</body>
</html>
