<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0814" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <title>Platform ZEGO PoC | TASFUL Live Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../live/live.css" />
  <link rel="stylesheet" href="../live/live-zego-poc.css" />
  <!-- ZEGO SDK deps + preload（Platform PoC · UMD 依存 · Provider と同一 CDN pin） -->
  <script src="https://cdn.jsdelivr.net/npm/long@5.2.0/umd/index.js"></script>
  <script>if (globalThis.Long && !globalThis.long) globalThis.long = globalThis.Long;</script>
  <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.4.0/dist/minimal/protobuf.min.js"></script>
  <script>
    if (globalThis.protobuf && !globalThis["protobufjs/minimal"]) {
      globalThis["protobufjs/minimal"] = globalThis.protobuf;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/zego-express-logger@1.5.0/ZegoExpressLogger.js"></script>
  <script>
    if (globalThis.ZegoLogger && !globalThis["zego-express-logger"]) {
      globalThis["zego-express-logger"] = {
        ZegoLogger: globalThis.ZegoLogger,
        ZegoDataReport: globalThis.ZegoDataReport,
        createZegoWebSocket: globalThis.createZegoWebSocket,
        LoggerStateCenter: globalThis.LoggerStateCenter,
      };
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/zego-express-engine-webrtc@3.12.0/ZegoExpressWebRTC.js" crossorigin="anonymous"></script>
</head>
<body class="live-body" data-page="platform-zego-poc">
  <div class="live-shell">
    <header class="live-header">
      <a class="live-header__back" href="../index-top.html">← Platform トップ</a>
      <div>
        <h1 class="live-header__title">Platform ZEGO PoC</h1>
        <p class="live-header__sub">Platform Live Core · Adapter · TLV ZEGO Provider · 非本番</p>
      </div>
    </header>
    <main class="live-main" data-platform-zego-poc-root>
      <p class="live-loading">読み込み中…</p>
    </main>
  </div>

  <!-- Config: example defaults · platform-live-zego-config.js が dist 生成時に上書き -->
  <script src="platform-live-zego-config.example.js"></script>
  <script src="platform-live-zego-config.js"></script>
  <script src="core/live-surfaces.js"></script>
  <script src="core/live-session-states.js"></script>

  <script src="provider/stub-live-provider.js"></script>

  <script src="core/live-platform-service.js"></script>
  <script src="zego-platform-poc.js"></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      const root = document.querySelector("[data-platform-zego-poc-root]");
      if (root && window.PlatformZegoPoc?.mountPlatformZegoPocPage) {
        window.PlatformZegoPoc.mountPlatformZegoPocPage(root);
      }
    });
  </script>
